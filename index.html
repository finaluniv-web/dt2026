<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FINAL 파이널체대입시 - 학생 기록지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#111827;--accent:#4f46e5;--accent2:#ec4899;--accent3:#06b6d4;--accent4:#10b981;--accent5:#f59e0b;--bg:#f3f4f6;--card:#fff;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--primary);min-height:100vh;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#666;margin-top:12px;font-size:12px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 28px;width:100%;max-width:380px;text-align:center}
.login-logo{margin-bottom:8px}
.login-logo img{height:30px}
.login-logo .logo-text{font-size:20px;font-weight:900;letter-spacing:-1px}
.login-campus{display:inline-block;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:24px}
.login-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:6px}
.login-sub{font-size:12px;color:#9ca3af;margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;font-family:inherit;text-align:center;letter-spacing:8px;font-weight:700;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{letter-spacing:0;font-weight:400;font-size:13px;color:#d1d5db}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;transition:opacity .2s}
.login-btn:active{opacity:.8}
.login-error{color:var(--accent2);font-size:12px;margin-top:12px;min-height:18px;font-weight:600}
.login-name{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.profile-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.profile-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f0f4}
.profile-header-left{display:flex;align-items:center;gap:10px}
.profile-header img{height:26px}
.profile-header .logo-text{font-size:17px;font-weight:900;letter-spacing:-1px;color:var(--primary)}
.campus-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.3px}
.profile-body{padding:20px;display:flex;align-items:center;gap:14px}
.p-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(79,70,229,.25);letter-spacing:-0.5px}
.p-info{flex:1}
.p-name{font-size:20px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.p-sub{font-size:12px;color:#9ca3af;margin-top:2px}
.profile-footer{padding:0 20px 16px;display:flex;gap:6px;flex-wrap:wrap}
.p-tag{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 11px;font-size:10px;color:#6b7280;font-weight:500}
.p-tag b{color:var(--accent);font-weight:700}
.p-tag.class-tag{background:#eef2ff;border-color:#c7d2fe;color:var(--accent);font-weight:700}
.tab-wrap{background:#fff;border-radius:12px;padding:4px;margin-bottom:16px;display:flex;gap:4px;box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{flex-shrink:0;flex:1;padding:10px 0;border:none;border-radius:10px;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:#9ca3af;font-family:inherit;transition:all .2s;text-align:center;white-space:nowrap}
.tab-btn.on{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tab-btn:active{transform:scale(.97)}
.pane{display:none}.pane.on{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--accent2)}.dot-purple{background:var(--accent)}.dot-blue{background:var(--accent3)}.dot-green{background:var(--accent4)}.dot-yellow{background:var(--accent5)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid #f0f0f4;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.stat-box .sl{font-size:10px;color:#9ca3af;margin-bottom:2px;font-weight:500}
.stat-box .sv{font-size:20px;font-weight:800;color:var(--primary)}
.stat-box .su{font-size:9px;color:#d1d5db;margin-top:1px}
.sv.up{color:var(--accent2)}.sv.dn{color:var(--accent3)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -20px;padding:0 20px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:580px}
.tbl th{background:#f9fafb;padding:10px 8px;text-align:center;font-weight:600;color:#6b7280;border-bottom:2px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;font-size:10px}
.tbl td{padding:10px 8px;text-align:center;border-bottom:1px solid #f3f4f6;color:#374151;font-size:11px}
.tbl tbody tr:hover{background:#f9fafb}
.tbl .dt{color:#9ca3af;font-size:10px;font-weight:500}
.chg-up{display:inline-block;color:#ec4899;font-weight:700;font-size:9px;background:#fdf2f8;padding:1px 5px;border-radius:4px;margin-top:2px}
.chg-dn{display:inline-block;color:#06b6d4;font-weight:700;font-size:9px;background:#ecfeff;padding:1px 5px;border-radius:4px;margin-top:2px}
.mock-list{display:flex;flex-direction:column;gap:10px}
.m-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #f0f0f4;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.m-card .m-exam{font-size:14px;font-weight:700;margin-bottom:10px}
.m-subjects{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.m-subj{background:#f9fafb;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid #e5e7eb;display:flex;flex-direction:column;justify-content:center;min-height:90px}
.m-subj .ms-name{font-size:9px;color:#9ca3af;margin-bottom:3px;font-weight:500;min-height:24px;display:flex;align-items:center;justify-content:center}
.m-subj .ms-grade{font-size:20px;font-weight:800}
.m-subj .ms-detail{font-size:9px;color:#9ca3af;margin-top:2px;min-height:14px}
.mg1{color:#4f46e5}.mg2{color:#06b6d4}.mg3{color:#10b981}.mg4{color:#f59e0b}.mg5{color:#f97316}.mg6{color:#ef4444}.mg7{color:#dc2626}.mg8{color:#991b1b}.mg9{color:#6b7280}
.mock-detail-list{display:flex;flex-direction:column;gap:8px}
.mock-detail-exam{background:#f9fafb;border-radius:12px;padding:14px;border:1px solid #f0f0f4}
.mock-detail-exam .mde-title{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.mock-detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6}
.mock-detail-row:last-child{border-bottom:none}
.mdr-left{display:flex;align-items:center;gap:8px}
.mdr-subj{font-size:12px;font-weight:700;color:var(--primary);min-width:42px}
.mdr-select{font-size:10px;color:#9ca3af;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mdr-right{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280}
.mdr-right span{min-width:32px;text-align:right}
.mdr-grade{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;border-radius:50%;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.mdr-grade.gb1{background:#4f46e5}.mdr-grade.gb2{background:#06b6d4}.mdr-grade.gb3{background:#10b981}.mdr-grade.gb4{background:#f59e0b}.mdr-grade.gb5{background:#f97316}.mdr-grade.gb6{background:#ef4444}.mdr-grade.gb7{background:#dc2626}.mdr-grade.gb8{background:#991b1b}.mdr-grade.gb9{background:#6b7280}
.mdr-label{font-size:9px;color:#d1d5db;min-width:24px}
.gpa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gpa-card{background:#f9fafb;border-radius:14px;padding:20px 14px;text-align:center;border:1px solid #f0f0f4}
.gpa-card .gc-label{font-size:10px;color:#9ca3af;margin-bottom:6px;font-weight:500}
.gpa-card .gc-val{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gpa-card .gc-sub{font-size:9px;color:#d1d5db;margin-top:3px}
.chart-box{position:relative;height:220px;margin-top:8px}
.gb{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;font-size:11px;font-weight:700;color:#fff}
.gb1{background:#4f46e5}.gb2{background:#06b6d4}.gb3{background:#10b981}.gb4{background:#f59e0b}.gb5{background:#f97316}.gb6{background:#ef4444}.gb7{background:#dc2626}.gb8{background:#991b1b}.gb9{background:#6b7280}

/* ── 지원현황 ── */
.univ-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;border:1px solid #f0f0f4}
.univ-card:active{transform:scale(.98)}
.univ-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.univ-name{font-size:.92rem;font-weight:800;color:var(--primary)}
.univ-type{font-size:.68rem;background:#eef2ff;color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:700}
.univ-dept{font-size:.78rem;color:#9ca3af;margin-bottom:8px}
.univ-score{font-size:.82rem;color:var(--primary)}
.univ-score b{font-size:1rem;color:var(--accent)}
.univ-arrow{font-size:.72rem;color:var(--accent);text-align:right;margin-top:8px;font-weight:600}
.univ-detail{display:none;padding:0}
.univ-detail.on{display:block}
.univ-back{display:inline-block;padding:8px 16px;border:2px solid var(--accent);border-radius:10px;background:transparent;color:var(--accent);font-size:.78rem;font-weight:700;cursor:pointer;margin-bottom:14px;font-family:inherit}
.univ-back:active{background:var(--accent);color:#fff}
.univ-detail-header{text-align:center;padding:24px 16px;background:linear-gradient(135deg,#312e81,var(--accent));border-radius:var(--radius);color:#fff;margin-bottom:14px}
.udh-name{font-size:1.2rem;font-weight:800}
.udh-dept{font-size:.82rem;opacity:.85;margin-top:2px}
.udh-type{display:inline-block;margin-top:8px;padding:3px 12px;background:rgba(255,255,255,.2);border-radius:20px;font-size:.72rem;font-weight:600}
.udh-score{font-size:2.2rem;font-weight:900;margin-top:12px}
.udh-score-label{font-size:.72rem;opacity:.7}
.univ-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ui-item{padding:10px;background:#f9fafb;border-radius:10px;border:1px solid #f0f0f4;text-align:center}
.ui-label{font-size:.68rem;color:#9ca3af;margin-bottom:2px}
.ui-val{font-size:.88rem;font-weight:700}
.univ-record-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid #f0f0f4}
.ur-title{font-size:.85rem;font-weight:800;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}

@media(max-width:400px){
  .wrap{padding:10px}.profile-body{padding:16px}.p-name{font-size:18px}
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}.stat-box{padding:10px 6px}.stat-box .sv{font-size:17px}
  .tab-btn{font-size:11px;padding:8px 0}.chart-box{height:180px}
  .profile-header img{height:22px}
  .m-subjects{grid-template-columns:repeat(3,1fr)}
  .login-card{padding:30px 20px}
}
@media(min-width:641px){.stat-grid{grid-template-columns:repeat(4,1fr)}.m-subjects{grid-template-columns:repeat(6,1fr)}}
@media print{body{background:#fff}.tab-wrap{display:none}.pane{display:block!important}}
.no-data{text-align:center;padding:30px;color:#d1d5db;font-size:13px}
.err-msg{color:var(--accent2);text-align:center;padding:40px;font-size:13px}
</style>
</head>

const SID='1JT-y2ZF6GLQD4ZYzP8yxFp6flxxc_F_vCMXGdY-gogs';

const URLS={info:sURL('1.인적사항'),fitness:sURL('2.실기테스트'),mock:sURL('3.모의고사성적'),gpa:sURL('4.내신성적'),apply:sURL('5.지원현황')};

/* ── CSV 파서 ── */
function parseRow(l){if(!l)return[];const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}
function parseCSV(t){const ls=t.split('\n').filter(l=>l.trim());if(ls.length<2)return[];const h=parseRow(ls[0]);return ls.slice(1).map(l=>{const c=parseRow(l);const o={};h.forEach((k,i)=>o[k]=c[i]||'');return o})}
function fDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');if(s.length<6)return d;return s.substring(2,4)+'.'+s.substring(4,6)}
function fullDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');if(s.length<6)return d;return'20'+s.substring(0,2)+'.'+s.substring(2,4)+'.'+s.substring(4,6)}

function makeLineOpts(reverse){
  return{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12,family:'Noto Sans KR'},bodyFont:{size:11,family:'Noto Sans KR'},padding:10,cornerRadius:8,displayColors:true}},
    scales:{y:Object.assign({grid:{color:'#f3f4f6'},ticks:{font:{size:10}}},reverse?{reverse:true,min:1,max:9,ticks:{stepSize:1,font:{size:10}}}:{beginAtZero:false}),x:{grid:{display:false},ticks:{font:{size:10}}}}
  };
}

function findById(data,id){
  const target=parseInt(id);
  if(isNaN(target))return null;
  return data.find(r=>{const rowNo=parseInt(String(r['no']).replace(/\D/g,''));return rowNo===target})||null;
}

  if(!studentId){
    document.getElementById('loginName').textContent='';
    document.getElementById('loginErr').textContent='잘못된 접속입니다. 올바른 URL을 확인하세요.';
    document.getElementById('pwInput').style.display='none';
    document.getElementById('loginBtn').style.display='none';
    return;
  }
  try{
    const res=await fetch(URLS.info);
    const text=await res.text();
    allInfoData=parseCSV(text);
    const me=findById(allInfoData,studentId);
    if(!me){
      document.getElementById('loginName').textContent='';
      document.getElementById('loginErr').textContent='존재하지 않는 학생 번호입니다.';
      document.getElementById('pwInput').style.display='none';
      document.getElementById('loginBtn').style.display='none';
      return;
    }
    document.getElementById('loginName').textContent=me['이름'];
    studentName=me['이름'];
    studentSchool=me['학교']||'';
    document.title=studentName+' - FINAL 기록지';
  }catch(e){
    document.getElementById('loginName').textContent='';
    document.getElementById('loginErr').textContent='데이터를 불러올 수 없습니다. 새로고침 해주세요.';
  }
}

function tryLogin(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw){document.getElementById('loginErr').textContent='비밀번호를 입력하세요.';return;}
  const me=findById(allInfoData,studentId);
  if(!me){document.getElementById('loginErr').textContent='오류가 발생했습니다.';return;}
  if(String(me['비밀번호']).trim()!==pw){
    document.getElementById('loginErr').textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    return;
  }
  studentName=me['이름'];
  studentSchool=me['학교']||'';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('loading').style.display='flex';
  loadRecords(me);
}

document.getElementById('loginBtn').addEventListener('click',tryLogin);
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin()});

/* ====== 데이터 로드 ====== */
async function loadRecords(info){
  try{
    const [fT,mT,gT,aT]=await Promise.all([
      fetch(URLS.fitness).then(r=>r.text()),
      fetch(URLS.mock).then(r=>r.text()),
      fetch(URLS.gpa).then(r=>r.text()),
      fetch(URLS.apply).then(r=>r.text()),
    ]);
    const gpa=(parseCSV(gT).find(r=>r['이름']===studentName&&r['학교']===studentSchool))||{};
    const fc=renderFitness(fT);
    const mc=renderMock(mT);
    renderProfile(info,fc,mc);
    renderGPA(gpa);
    renderUnivList(aT);
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<p class="err-msg">데이터를 불러오지 못했습니다.<br>새로고침 해주세요.</p>';
    return;
  }
  document.getElementById('loading').classList.add('hide');
  const a=document.getElementById('app');a.style.display='block';
  setTimeout(()=>{a.style.transition='opacity .5s';a.style.opacity='1'},50);
}

/* ====== 프로필 ====== */
function renderProfile(info,fc,mc){
  const n=info['이름']||studentName;
  const cls=info['수강반']||'';
  const av=document.getElementById('av');
  if(cls){av.textContent=cls;av.style.fontSize=cls.length>3?'11px':'13px'}else{av.textContent=n.slice(-1);av.style.fontSize='20px'}
  document.getElementById('pName').textContent=n;
  document.getElementById('pSub').textContent=(info['학교']||'')+' '+(info['학년']||'')+' · 개인 기록지';
  let h='';
  if(cls) h+='<span class="p-tag class-tag">'+cls+'</span>';
  if(info['성별']) h+='<span class="p-tag">'+info['성별']+'</span>';
  if(fc) h+='<span class="p-tag">실기 <b>'+fc+'회</b></span>';
  if(mc) h+='<span class="p-tag">모의고사 <b>'+mc+'회</b></span>';
  document.getElementById('pTags').innerHTML=h;
}

/* ====== 실기 ====== */
function renderFitness(raw){
  const lines=raw.split('\n').filter(l=>l.trim());
  if(lines.length<2)return 0;
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=parseRow(lines[i]);
    if(c[1]===studentName&&c[3]===studentSchool)rows.push(c);
  }
  if(!rows.length){document.getElementById('fitNone').style.display='';return 0}
  rows.sort((a,b)=>a[0].localeCompare(b[0]));
  const items=[
    {name:'배근력',u:'kg',ri:5,si:6,color:'#ec4899'},
    {name:'10m왕복',u:'초',ri:7,si:8,color:'#4f46e5'},
    {name:'메디신볼',u:'m',ri:9,si:10,color:'#06b6d4'},
    {name:'좌전굴',u:'cm',ri:11,si:12,color:'#10b981'},
    {name:'제자리멀리뛰기',u:'cm',ri:13,si:14,color:'#f59e0b'},
    {name:'20m왕복',u:'초',ri:15,si:16,color:'#8b5cf6'},
  ];
  const tI=rows[0].length-2;
  const L=rows[rows.length-1],F=rows[0],st=document.getElementById('fitStats');
  let s='<div class="stat-box"><div class="sl">측정</div><div class="sv">'+rows.length+'</div><div class="su">회</div></div>';
  s+='<div class="stat-box"><div class="sl">최신 총점</div><div class="sv">'+(L[tI]||'-')+'</div><div class="su">/ 600</div></div>';
  if(rows.length>1){const d=(parseFloat(L[tI])-parseFloat(F[tI])).toFixed(1);s+='<div class="stat-box"><div class="sl">성장</div><div class="sv '+(d>=0?'up':'dn')+'">'+(d>0?'+':'')+d+'</div><div class="su">점</div></div>'}
  items.forEach(it=>{const v=L[it.si];if(v)s+='<div class="stat-box"><div class="sl">'+it.name+'</div><div class="sv">'+v+'</div><div class="su">점</div></div>'});
  st.innerHTML=s;

  const hdr=document.getElementById('fitH');
  hdr.innerHTML='<th>날짜</th>';
  items.forEach(it=>{hdr.innerHTML+='<th>'+it.name+'<br><span style="color:#d1d5db;font-weight:400">'+it.u+'</span></th><th>점수</th>'});
  hdr.innerHTML+='<th style="background:#eef1ff">총점</th>';
  const tb=document.getElementById('fitB');
  rows.forEach((c,i)=>{
    const tr=document.createElement('tr');
    let h='<td class="dt">'+fullDate(c[0])+'</td>';
    items.forEach(it=>{
      const sc=c[it.si]||'';let ch='';
      if(i>0&&sc&&rows[i-1][it.si]){const d=(parseFloat(sc)-parseFloat(rows[i-1][it.si])).toFixed(1);if(d>0)ch='<br><span class="chg-up">+'+d+'</span>';else if(d<0)ch='<br><span class="chg-dn">'+d+'</span>'}
      h+='<td>'+(c[it.ri]||'-')+'</td><td>'+(sc||'-')+ch+'</td>';
    });
    h+='<td style="font-weight:800;background:#fafaff;color:var(--accent)">'+(c[tI]||'-')+'</td>';
    tr.innerHTML=h;tb.appendChild(tr);
  });

  const dateLabels=rows.map(r=>fDate(r[0]));
  new Chart(document.getElementById('fitTotalChart'),{
    type:'line',data:{labels:dateLabels,datasets:[{
      label:'총점',data:rows.map(r=>parseFloat(r[tI])||null),
      borderColor:'#312e81',backgroundColor:'rgba(79,70,229,.1)',
      tension:.4,pointRadius:6,pointBackgroundColor:'#4f46e5',
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:3,fill:true
    }]},options:makeLineOpts(false)
  });

  const container=document.getElementById('fitItemCharts');
  items.forEach(it=>{
    const scores=rows.map(r=>parseFloat(r[it.si])||null);
    const recs=rows.map(r=>r[it.ri]?(r[it.ri]+it.u):'');
    if(scores.every(v=>v===null))return;
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="card-title"><span class="dot" style="background:'+it.color+'"></span>'+it.name+' <span style="font-weight:400;color:#9ca3af;font-size:12px">('+it.u+')</span></div><div class="chart-box"><canvas></canvas></div>';

      }]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:false},
          tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12,family:'Noto Sans KR'},bodyFont:{size:11,family:'Noto Sans KR'},padding:10,cornerRadius:8,
            callbacks:{title:ctx=>{const idx=ctx[0].dataIndex;return fullDate(rows[idx][0])},label:ctx=>{const idx=ctx.dataIndex;return'기록: '+recs[idx]+' / 점수: '+scores[idx]+'점'}}

          x:{grid:{display:false},ticks:{font:{size:9}},title:{display:true,text:'기록 ('+it.u+')',font:{size:10,weight:'bold'}}}
        }
      }
    });
  });
  return rows.length;
}

        plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'Noto Sans KR'},usePointStyle:true,pointStyle:'circle',padding:10}},
        tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12},bodyFont:{size:11},padding:10,cornerRadius:8}},scales}
    });
  });
  return rows.length;
}

/* ====== 지원현황 ====== */
/* URL 매핑: 대학명 → 전용 페이지 URL */
const UNIV_URL_MAP={
  '동국대학교':'https://finaluniv-web.github.io/dongguk/',
  '가천대학교':'https://finaluniv-web.github.io/gachon/'
};

function renderUnivList(raw){
  const lines=raw.split('\n').filter(l=>l.trim());
  if(lines.length<2){document.getElementById('univNone').style.display='';return}
  /* 내 행 찾기: 0:no 1:이름 2:성별 3:학년 4:학교 5:수강반 6~:대학1,학과1,구분1,환산점수1... */
  let myRow=null;
  for(let i=1;i<lines.length;i++){
    const cols=parseRow(lines[i]);
    if((cols[1]||'').trim()===studentName&&(cols[4]||'').trim()===studentSchool){myRow=cols;break}
  }
  if(!myRow){document.getElementById('univNone').style.display='';return}

  const cards=[];
  for(let u=0;u<8;u++){
    const base=6+u*4;
    const uName=(myRow[base]||'').trim();
    if(!uName)continue;
    const dept=(myRow[base+1]||'').trim();
    const admType=(myRow[base+2]||'').trim();
    const score=(myRow[base+3]||'').trim();
    const url=UNIV_URL_MAP[uName]||'';
    cards.push({name:uName,dept:dept,type:admType,score:score,url:url});
  }
  if(!cards.length){document.getElementById('univNone').style.display='';return}

  const list=document.getElementById('univList');
  list.innerHTML=cards.map((c,idx)=>{
    return'<div class="univ-card" data-idx="'+idx+'">'+
      '<div class="univ-card-top"><span class="univ-name">'+c.name+'</span><span class="univ-type">'+c.type+'</span></div>'+
      '<div class="univ-dept">'+c.dept+'</div>'+
      '<div class="univ-score">환산점수 <b>'+(c.score||'-')+'</b></div>'+
      '<div class="univ-arrow">상세보기 →</div></div>';
  }).join('');

  list.querySelectorAll('.univ-card').forEach(el=>{
    el.addEventListener('click',()=>showUnivDetail(cards[parseInt(el.dataset.idx)]));
  });
}

function showUnivDetail(c){
  const detail=document.getElementById('univDetail');
  const listView=document.getElementById('univListView');

  if(c.url){
    /* iframe 방식: 대학 전용 페이지가 있는 경우 */
    const fullUrl=c.url+(c.url.indexOf('?')===-1?'?':'&')+
      'name='+encodeURIComponent(studentName)+
      '&school='+encodeURIComponent(studentSchool)+
      '&type='+encodeURIComponent(c.type);
    listView.style.display='none';
    detail.className='univ-detail on';
    detail.innerHTML=
      '<button class="univ-back" onclick="hideUnivDetail()">← 목록으로</button>'+
      '<iframe src="'+fullUrl+'" style="width:100%;height:calc(100vh - 80px);border:none;border-radius:16px;box-shadow:var(--shadow)"></iframe>';
  }else{
    /* 시트 기반 상세보기 */
    listView.style.display='none';
    detail.className='univ-detail on';
    const tabName=(c.name+c.dept).replace(/\s/g,'');
    const univRecURL=uURL(tabName);
    detail.innerHTML=
      '<button class="univ-back" onclick="hideUnivDetail()">← 목록으로</button>'+
      '<div class="univ-detail-header"><div class="udh-name">'+c.name+'</div><div class="udh-dept">'+c.dept+'</div><div class="udh-type">'+c.type+'</div><div class="udh-score">'+(c.score||'-')+'</div><div class="udh-score-label">환산점수</div></div>'+
      '<div id="univRecordArea"><div class="no-data">기록을 불러오는 중...</div></div>';
    loadUnivRecords(univRecURL,c.type);
  }
}

async function loadUnivRecords(url,admType){
  const area=document.getElementById('univRecordArea');
  try{
    const res=await fetch(url);
    if(!res.ok)throw new Error('시트 없음');
    const text=await res.text();
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2){area.innerHTML='<div class="no-data">아직 기록이 없습니다.</div>';return}
    const headers=parseRow(lines[0]);
    const myRows=[];
    for(let i=1;i<lines.length;i++){
      const c=parseRow(lines[i]);
      /* 0:구분 1:전형 2:날짜 3:이름 4:성별 5:학교 6:대학명 7:학과명 8:환산점수 ... 총점(마지막) */
      if((c[3]||'').trim()!==studentName)continue;
      if(studentSchool&&(c[5]||'').trim()!==studentSchool)continue;
      if(admType&&(c[1]||'').trim()!==admType)continue;
      myRows.push(c);
    }
    if(!myRows.length){area.innerHTML='<div class="no-data">해당 전형의 기록이 없습니다.</div>';return}

    const fixedCols=9;
    const lastIdx=headers.length-1;
    const eventHeaders=headers.slice(fixedCols,lastIdx);
    const hasScorePairs=eventHeaders.some(h=>(h||'').trim()==='환산점수');
    let events=[];
    if(hasScorePairs){
      for(let e=0;e<eventHeaders.length;e+=2)events.push({name:eventHeaders[e],recIdx:fixedCols+e,scoreIdx:fixedCols+e+1});
    }else{
      for(let e=0;e<eventHeaders.length;e++)events.push({name:eventHeaders[e],recIdx:fixedCols+e,scoreIdx:null});
    }

    let html='<div class="univ-record-card"><div class="ur-title"><span class="dot dot-green"></span>실기 측정 기록 ('+myRows.length+'회)</div>';
    myRows.forEach(row=>{
      html+='<div style="background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #f0f0f4">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;font-weight:700">'+(row[0]||'-')+'</span><span style="font-size:11px;color:#9ca3af">'+(row[2]||'')+'</span></div>';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#6b7280">환산점수</span><span style="font-size:13px;font-weight:800;color:var(--accent)">'+(row[8]||'-')+'</span></div>';
      events.forEach(ev=>{
        const rec=row[ev.recIdx]||'-';
        const sc=ev.scoreIdx!==null?(row[ev.scoreIdx]||'-'):null;
        html+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:#374151"><span>'+ev.name+'</span><span><b>'+rec+'</b>'+(sc!==null?' <span style="color:#9ca3af;font-size:10px">('+sc+'점)</span>':'')+'</span></div>';
      });
      html+='<div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid #e5e7eb"><span style="font-size:12px;font-weight:700">총점</span><span style="font-size:15px;font-weight:900;color:var(--accent)">'+(row[lastIdx]||'-')+'</span></div>';
      html+='</div>';
    });
    html+='</div>';

    if(myRows.length>=2){
      html+='<div class="card"><div class="card-title"><span class="dot dot-red"></span>총점 변화</div><div class="chart-box"><canvas id="univTotalChart"></canvas></div></div>';
    }
    area.innerHTML=html;

    if(myRows.length>=2){
      const labels=myRows.map(r=>fDate(r[2])||r[0]||'');
      const totals=myRows.map(r=>parseFloat(r[lastIdx])||null);
      new Chart(document.getElementById('univTotalChart'),{
        type:'line',data:{labels,datasets:[{label:'총점',data:totals,borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,.1)',tension:.4,pointRadius:6,pointBackgroundColor:'#4f46e5',pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:3,fill:true}]},
        options:makeLineOpts(false)
      });
    }
  }catch(e){area.innerHTML='<div class="no-data">해당 대학의 기록 시트가 아직 없습니다.</div>';}
}

function hideUnivDetail(){
  document.getElementById('univDetail').className='univ-detail';
  document.getElementById('univDetail').innerHTML='';
  document.getElementById('univListView').style.display='';
}

/* ====== 탭 ====== */
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('p-'+b.dataset.t).classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

/* ====== 시작 ====== */
initLogin();
</script>
