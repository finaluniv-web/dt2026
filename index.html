<!DOCTYPE html>

<style>
:root{--primary:#111827;--accent:#4f46e5;--accent2:#ec4899;--accent3:#06b6d4;--accent4:#10b981;--accent5:#f59e0b;--bg:#f3f4f6;--card:#fff;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--primary);min-height:100vh;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

.wrap{max-width:640px;margin:0 auto;padding:16px;opacity:0}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 28px;width:100%;max-width:380px;text-align:center}
.login-logo{margin-bottom:8px}.login-logo img{height:30px}.login-logo .logo-text{font-size:20px;font-weight:900;letter-spacing:-1px}
.login-campus{display:inline-block;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:24px}
.login-sub{font-size:12px;color:#9ca3af;margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;font-family:inherit;text-align:center;letter-spacing:8px;font-weight:700;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--accent)}

.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;transition:opacity .2s}
.login-btn:active{opacity:.8}

.login-name{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.profile-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.profile-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f0f4}

.campus-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.3px}

.p-info{flex:1}.p-name{font-size:20px;font-weight:800;color:var(--primary);letter-spacing:-.5px}.p-sub{font-size:12px;color:#9ca3af;margin-top:2px}
.profile-footer{padding:0 20px 16px;display:flex;gap:6px;flex-wrap:wrap}

.pane{display:none}.pane.on{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:580px}

@media(max-width:400px){.wrap{padding:10px}.profile-body{padding:16px}.p-name{font-size:18px}.stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}.stat-box{padding:10px 6px}.stat-box .sv{font-size:17px}.tab-btn{font-size:11px;padding:8px 0}.chart-box{height:180px}.profile-header img{height:22px}.m-subjects{grid-template-columns:repeat(3,1fr)}.login-card{padding:30px 20px}}

.err-msg{color:var(--accent2);text-align:center;padding:40px;font-size:13px}
</style>
</head>

/* ── 시트 ID ── */
var SID  = '1JT-y2ZF6GLQD4ZYzP8yxFp6flxxc_F_vCMXGdY-gogs';
var UNIV_SID = '1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';

function sURL(n){ return 'https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(n); }
function uURL(n){ return 'https://docs.google.com/spreadsheets/d/'+UNIV_SID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(n); }

var URLS = {

};

};

var studentId = new URLSearchParams(location.search).get('id') || '';

/* ── CSV 파서 ── */
function parseRow(l){
  if(!l) return [];
  var r=[],c='',q=false;
  for(var i=0;i<l.length;i++){
    var ch=l[i];
    if(q){ if(ch==='"'&&l[i+1]==='"'){c+='"';i++;}else if(ch==='"')q=false;else c+=ch; }
    else{ if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c='';}else c+=ch; }
  }
  r.push(c.trim());
  return r;
}
function parseCSV(t){
  var ls=t.split('\n').filter(function(l){return l.trim();});
  if(ls.length<2)return [];
  var h=parseRow(ls[0]);
  return ls.slice(1).map(function(l){
    var c=parseRow(l); var o={};
    h.forEach(function(k,i){ o[k]=c[i]||''; });
    return o;
  });
}

/* ── 날짜 ── */
function fDate(d){
  if(!d||d.length<6)return d;
  var s=d.replace(/\D/g,'');
  if(s.length<6)return d;
  return s.substring(2,4)+'.'+s.substring(4,6);
}
function fullDate(d){
  if(!d||d.length<6)return d;
  var s=d.replace(/\D/g,'');
  if(s.length<6)return d;
  return '20'+s.substring(0,2)+'.'+s.substring(2,4)+'.'+s.substring(4,6);
}

/* ── 차트 옵션 ── */
function makeLineOpts(reverse){
  return {responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},

/* ── 학생번호로 찾기 ── */
function findById(data,id){
  var target=parseInt(id);
  if(isNaN(target))return null;
  return data.find(function(r){ var n=parseInt(String(r['no']).replace(/\D/g,'')); return n===target; })||null;
}

/* ══════════════════════════════════════════════
   로그인
   ══════════════════════════════════════════════ */
var allInfoData=[];

function initLogin(){
  if(!studentId){
    document.getElementById('loginName').textContent='';
    document.getElementById('loginErr').textContent='잘못된 접속입니다.';
    document.getElementById('pwInput').style.display='none';
    document.getElementById('loginBtn').style.display='none';
    return;
  }
  fetch(URLS.info).then(function(r){return r.text();}).then(function(text){
    allInfoData=parseCSV(text);
    var me=findById(allInfoData,studentId);
    if(!me){
      document.getElementById('loginName').textContent='';
      document.getElementById('loginErr').textContent='존재하지 않는 학생 번호입니다.';
      document.getElementById('pwInput').style.display='none';
      document.getElementById('loginBtn').style.display='none';
      return;
    }
    document.getElementById('loginName').textContent=me['이름'];
    studentName=me['이름']; studentSchool=me['학교']||'';
    document.title=studentName+' - FINAL 기록지';
  }).catch(function(){
    document.getElementById('loginName').textContent='';
    document.getElementById('loginErr').textContent='데이터를 불러올 수 없습니다. 새로고침 해주세요.';
  });
}

function tryLogin(){
  var pw=document.getElementById('pwInput').value.trim();
  if(!pw){document.getElementById('loginErr').textContent='비밀번호를 입력하세요.';return;}
  var me=findById(allInfoData,studentId);
  if(!me){document.getElementById('loginErr').textContent='오류가 발생했습니다.';return;}
  if(String(me['비밀번호']).trim()!==pw){
    document.getElementById('loginErr').textContent='비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();return;
  }
  studentName=me['이름']; studentSchool=me['학교']||'';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('loading').style.display='flex';
  loadRecords(me);
}

document.getElementById('loginBtn').addEventListener('click',tryLogin);
document.getElementById('pwInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});

/* ══════════════════════════════════════════════
   데이터 로드
   ══════════════════════════════════════════════ */
function loadRecords(info){
  Promise.all([
    fetch(URLS.fitness).then(function(r){return r.text();}),
    fetch(URLS.mock).then(function(r){return r.text();}),
    fetch(URLS.gpa).then(function(r){return r.text();}),
    fetch(URLS.apply).then(function(r){return r.text();}),
    fetch(URLS.univInfo).then(function(r){return r.text();}).catch(function(){return '';})
  ]).then(function(results){
    var fT=results[0], mT=results[1], gT=results[2], aT=results[3], uiT=results[4];
    /* 6.대학정보 파싱 */
    if(uiT) allUnivInfo=parseCSV(uiT); else allUnivInfo=[];
    var gpaData=parseCSV(gT);
    var gpa=gpaData.find(function(r){return r['이름']===studentName&&r['학교']===studentSchool;})||{};
    var fc=renderFitness(fT);
    var mc=renderMock(mT);
    renderProfile(info,fc,mc);
    renderGPA(gpa);
    renderUnivList(aT);
    /* 완료 */
    document.getElementById('loading').classList.add('hide');
    var app=document.getElementById('app');
    app.style.display='block';
    setTimeout(function(){app.style.transition='opacity .5s';app.style.opacity='1';},50);
  }).catch(function(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<p class="err-msg">데이터를 불러오지 못했습니다.<br>새로고침 해주세요.</p>';
  });
}

   프로필
   ══════════════════════════════════════════════ */
function renderProfile(info,fc,mc){
  var n=info['이름']||studentName;
  var cls=info['수강반']||'';
  var av=document.getElementById('av');
  if(cls){av.textContent=cls;av.style.fontSize=cls.length>3?'11px':'13px';}
  else{av.textContent=n.slice(-1);av.style.fontSize='20px';}
  document.getElementById('pName').textContent=n;
  document.getElementById('pSub').textContent=(info['학교']||'')+' '+(info['학년']||'')+' · 개인 기록지';
  var h='';
  if(cls) h+='<span class="p-tag class-tag">'+cls+'</span>';
  if(info['성별']) h+='<span class="p-tag">'+info['성별']+'</span>';
  if(fc) h+='<span class="p-tag">실기 <b>'+fc+'회</b></span>';
  if(mc) h+='<span class="p-tag">모의고사 <b>'+mc+'회</b></span>';

}

/* ══════════════════════════════════════════════
   지원현황 – 카드 목록 + 6.대학정보 매칭
   ══════════════════════════════════════════════ */
function renderUnivList(applyRaw){
  var applyData=parseCSV(applyRaw);
  /* 현재 학생의 지원 row 찾기 */
  var me=applyData.find(function(r){return r['이름']===studentName&&r['학교']===studentSchool;});
  if(!me){document.getElementById('univNone').style.display='';return;}

  var entries=[];
  for(var n=1;n<=8;n++){
    var univ=me['대학'+n];
    var dept=me['학과'+n];
    if(!univ)continue;
    /* 5.지원현황의 구분 열: 반복 컬럼이므로 키 이름이 중복될 수 있음 */
    var gubun='', score='';
    /* 구분/환산점수 키 찾기 (CSV에서 중복 키는 뒤에 _N 붙는 경우도 있지만,
       parseCSV가 단순 매핑이므로 raw row로 직접 접근) */
    var rawCols=parseRow(applyRaw.split('\n').filter(function(l){return l.trim();})[0]);
    var myLine='';
    var allLines=applyRaw.split('\n').filter(function(l){return l.trim();});
    for(var li=1;li<allLines.length;li++){
      var rc=parseRow(allLines[li]);
      if(rc[1]===studentName&&rc[4]===studentSchool){myLine=allLines[li];break;}
    }
    if(myLine){
      var mc=parseRow(myLine);
      /* 대학1=col6, 학과1=col7, 구분=col8, 환산점수=col9
         대학2=col10, 학과2=col11, 구분=col12, 환산점수=col13 ... */
      var baseCol=6+(n-1)*4;
      gubun=mc[baseCol+2]||'';
      score=mc[baseCol+3]||'';
    }
    entries.push({univ:univ,dept:dept,gubun:gubun,score:score});
  }

  if(!entries.length){document.getElementById('univNone').style.display='';return;}

  var listEl=document.getElementById('univList');
  var h='';
  entries.forEach(function(e,idx){
    /* 6.대학정보에서 매칭 */
    var info=allUnivInfo.find(function(u){
      return u['대학명']===e.univ && u['학과']===e.dept && u['구분']===e.gubun;
    }) || allUnivInfo.find(function(u){
      return u['대학명']===e.univ && u['학과']===e.dept;
    }) || null;

    h+='<div class="univ-card" onclick="showUnivDetail('+idx+')">';
    h+='<div class="univ-card-top"><span class="univ-name">'+e.univ+'</span>';
    if(e.gubun) h+='<span class="univ-type">'+e.gubun+'</span>';
    h+='</div>';
    h+='<div class="univ-dept">'+e.dept+'</div>';
    if(e.score) h+='<div class="univ-score">환산점수 <b>'+e.score+'</b></div>';

    /* 6.대학정보 요약 표시 */
    if(info){
      h+='<div class="univ-info-summary">';
      if(info['모집인원']) h+='<div class="univ-info-item">모집인원 <b>'+info['모집인원']+'명</b></div>';
      if(info['총점']) h+='<div class="univ-info-item">총점 <b>'+info['총점']+'점</b></div>';
      if(info['내신']) h+='<div class="univ-info-item">내신 <b>'+info['내신']+'</b></div>';
      if(info['실기']) h+='<div class="univ-info-item">실기 <b>'+info['실기']+'</b></div>';
      if(info['전년도 경쟁률']) h+='<div class="univ-info-item">전년도 경쟁률 <b>'+info['전년도 경쟁률']+'</b></div>';
      if(info['전년도 모집인원']) h+='<div class="univ-info-item">전년도 모집 <b>'+info['전년도 모집인원']+'명</b></div>';
      if(info['실기종목']) h+='<div class="univ-info-item full">실기종목 <b>'+info['실기종목']+'</b></div>';
      h+='</div>';
    }

    h+='<div class="univ-arrow">상세 보기 →</div>';
    h+='</div>';
  });
  listEl.innerHTML=h;

  /* 데이터를 전역에 저장 (상세에서 사용) */
  window._univEntries=entries;
}

/* ══════════════════════════════════════════════
   지원현황 – 상세 보기 (iframe or 기록)
   ══════════════════════════════════════════════ */
function showUnivDetail(idx){
  var e=window._univEntries[idx];
  if(!e)return;

  var info=allUnivInfo.find(function(u){
    return u['대학명']===e.univ && u['학과']===e.dept && u['구분']===e.gubun;
  }) || allUnivInfo.find(function(u){
    return u['대학명']===e.univ && u['학과']===e.dept;
  }) || null;

  var url=UNIV_URL_MAP[e.univ]||(info&&info['URL']?info['URL']:'');

  document.getElementById('univListView').style.display='none';
  var det=document.getElementById('univDetail');
  det.className='univ-detail on';

  var h='<button class="univ-back" onclick="hideUnivDetail()">← 목록으로</button>';

  if(url){
    /* iframe 모드: 헤더 숨기고 iframe만 표시 */
    var iframeSrc=url+'?name='+encodeURIComponent(studentName)+'&school='+encodeURIComponent(studentSchool)+'&type='+encodeURIComponent(e.gubun);
    h+='<div class="univ-iframe-wrap"><iframe id="univIframe" src="'+iframeSrc+'" onload="adjustIframeHeight()"></iframe></div>';
  } else {
    /* 헤더 + 정보 그리드 */
    h+='<div class="univ-detail-header">';
    h+='<div class="udh-name">'+e.univ+'</div>';
    h+='<div class="udh-dept">'+e.dept+'</div>';
    if(e.gubun) h+='<div class="udh-type">'+e.gubun+'</div>';
    if(e.score){h+='<div class="udh-score-label">환산점수</div><div class="udh-score">'+e.score+'</div>';}
    h+='</div>';

    if(info){
      h+='<div class="univ-info-grid">';
      if(info['모집인원']) h+='<div class="ui-item"><div class="ui-label">모집인원</div><div class="ui-val">'+info['모집인원']+'명</div></div>';
      if(info['총점']) h+='<div class="ui-item"><div class="ui-label">총점</div><div class="ui-val">'+info['총점']+'점</div></div>';
      if(info['내신']) h+='<div class="ui-item"><div class="ui-label">내신</div><div class="ui-val">'+info['내신']+'</div></div>';
      if(info['실기']) h+='<div class="ui-item"><div class="ui-label">실기</div><div class="ui-val">'+info['실기']+'</div></div>';
      if(info['전년도 경쟁률']) h+='<div class="ui-item"><div class="ui-label">전년도 경쟁률</div><div class="ui-val">'+info['전년도 경쟁률']+'</div></div>';
      if(info['전년도 모집인원']) h+='<div class="ui-item"><div class="ui-label">전년도 모집</div><div class="ui-val">'+info['전년도 모집인원']+'명</div></div>';
      if(info['실기종목']) h+='<div class="ui-item" style="grid-column:1/-1"><div class="ui-label">실기종목</div><div class="ui-val">'+info['실기종목']+'</div></div>';
      h+='</div>';
    }
    h+='<div class="no-data">해당 대학의 외부 페이지가 등록되지 않았습니다.</div>';
  }

  det.innerHTML=h;
  window.scrollTo(0,0);
}

/* iframe 높이 자동 조절 */
function adjustIframeHeight(){
  var iframe=document.getElementById('univIframe');
  if(!iframe)return;
  try{
    var h=iframe.contentDocument.body.scrollHeight;
    if(h>100) iframe.style.height=h+'px';
  }catch(e){
    /* cross-origin: fallback */
    iframe.style.height='2000px';
  }
  /* 주기적 체크 (동적 콘텐츠 대응) */
  var cnt=0;
  var timer=setInterval(function(){
    cnt++;
    try{
      var h=iframe.contentDocument.body.scrollHeight;
      if(h>100) iframe.style.height=h+'px';
    }catch(ex){}
    if(cnt>=20) clearInterval(timer);
  },500);
}

/* postMessage 기반 높이 수신 */
window.addEventListener('message',function(ev){
  if(ev.data&&ev.data.type==='resize'&&ev.data.height){
    var iframe=document.getElementById('univIframe');
    if(iframe) iframe.style.height=ev.data.height+'px';
  }
});

function hideUnivDetail(){
  document.getElementById('univDetail').className='univ-detail';
  document.getElementById('univListView').style.display='';
  window.scrollTo(0,0);
}

/* ══════════════════════════════════════════════
   탭 전환
   ══════════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');});
    document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('on');});
    btn.classList.add('on');
    var t=btn.getAttribute('data-t');
    document.getElementById('p-'+t).classList.add('on');
    /* 지원현황 탭에서 돌아올 때 목록 표시 */
    if(t==='univ'){
      document.getElementById('univListView').style.display='';
      document.getElementById('univDetail').className='univ-detail';
    }
  });
});

/* ── 시작 ── */
initLogin();
</script>
