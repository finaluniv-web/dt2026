<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FINAL 파이널체대입시 - 학생 기록지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#111827;--accent:#4f46e5;--accent2:#ec4899;--accent3:#06b6d4;--accent4:#10b981;--accent5:#f59e0b;--bg:#f3f4f6;--card:#ffffff;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--primary);line-height:1.6;-webkit-font-smoothing:antialiased}

/* Loading */
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:16px;font-size:14px;color:#6b7280}

/* Top Bar */
.top-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;align-items:center;gap:10px}
.top-bar-left img{height:28px;object-fit:contain}
.campus-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.top-bar-right{font-size:13px;font-weight:600;color:#6b7280}

/* Wrap */
.wrap{max-width:720px;margin:0 auto;padding:16px 16px 60px}

/* Profile */
.profile-card{background:#fff;border-radius:var(--radius);padding:28px 24px 24px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px}
.profile-card .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 14px}
.profile-card .name{font-size:22px;font-weight:800;margin-bottom:4px}
.profile-card .sub{font-size:13px;color:#6b7280;margin-bottom:14px}
.tag-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:#f3f4f6;color:#374151}
.tag.cls{background:#ede9fe;color:#6d28d9}
.tag.gen{background:#fce7f3;color:#be185d}
.tag.fit{background:#ecfdf5;color:#059669}
.tag.mock{background:#eff6ff;color:#2563eb}

/* Tabs */
.tab-wrap{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.tab-btn{flex-shrink:0;padding:9px 20px;border-radius:30px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Pane */
.pane{display:none}
.pane.active{display:block}

/* Section */
.section{margin-bottom:24px}
.sec-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}

/* Card */
.card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}

/* Summary Grid */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sum-box{background:#f9fafb;border-radius:12px;padding:14px 10px;text-align:center}
.sum-box .label{font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:4px;text-transform:uppercase}
.sum-box .val{font-size:20px;font-weight:800;color:var(--primary)}
.sum-box .unit{font-size:10px;color:#9ca3af}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px}
table.tbl{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
.tbl th{background:#f9fafb;padding:10px 8px;font-weight:700;color:#6b7280;text-align:center;border-bottom:2px solid #e5e7eb;position:sticky;top:0}
.tbl td{padding:9px 8px;text-align:center;border-bottom:1px solid #f3f4f6}
.tbl tr:hover td{background:#f9fafb}
.tbl .up{color:#059669;font-weight:700}
.tbl .dn{color:#ef4444;font-weight:700}
.tbl .same{color:#9ca3af}

/* Chart */
.chart-box{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.chart-box h4{font-size:13px;font-weight:700;margin-bottom:10px;color:#374151}
.chart-box canvas{width:100%!important;max-height:260px}

/* Mock Card Grid */
.mock-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mock-card{background:#f9fafb;border-radius:12px;padding:14px 10px;text-align:center;border:1.5px solid #e5e7eb}
.mock-card .subj-name{font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:2px}
.mock-card .subj-detail{font-size:9px;color:#b0b0b0;margin-bottom:6px;min-height:14px}
.mock-card .grade{font-size:28px;font-weight:900}
.mock-card .grade.g1{color:#059669}.mock-card .grade.g2{color:#10b981}.mock-card .grade.g3{color:#3b82f6}.mock-card .grade.g4{color:#6366f1}.mock-card .grade.g5{color:#f59e0b}.mock-card .grade.g6{color:#f97316}.mock-card .grade.g7{color:#ef4444}.mock-card .grade.g8{color:#dc2626}.mock-card .grade.g9{color:#991b1b}
.mock-card .extra{font-size:10px;color:#6b7280;margin-top:4px}
.mock-card.empty{opacity:.4}
.mock-card.empty .grade{font-size:16px;color:#ccc}

/* GPA Grid */
.gpa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gpa-box{background:#f9fafb;border-radius:12px;padding:18px 10px;text-align:center;border:1.5px solid #e5e7eb}
.gpa-box .gpa-label{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:6px}
.gpa-box .gpa-val{font-size:26px;font-weight:900;color:var(--accent)}
.gpa-box .gpa-val.empty{font-size:14px;color:#ccc}

/* Error */
.err-msg{text-align:center;padding:40px;color:#ef4444;font-weight:600}

/* Responsive */
@media(max-width:480px){
  .sum-grid{grid-template-columns:repeat(2,1fr)}
  .mock-grid{grid-template-columns:repeat(2,1fr)}
  .gpa-grid{grid-template-columns:repeat(2,1fr)}
  .profile-card{padding:22px 16px 20px}
  .wrap{padding:12px 12px 40px}
}
@media print{
  .top-bar,.tab-wrap{display:none}
  .pane{display:block!important}
}
</style>
</head>
<body>

<div id="loading"><div class="ld-ring"></div><p>기록지를 불러오고 있습니다</p></div>

<div class="top-bar">
  <div class="top-bar-left">
    <img src="./logo.png" alt="FINAL" onerror="this.outerHTML='<span style=\"font-weight:900;font-size:18px;letter-spacing:-1px\">FINAL</span>'">
    <span class="campus-badge">동탄캠퍼스</span>
  </div>
  <div class="top-bar-right">학생 개인 기록지</div>
</div>

<div class="wrap" id="app" style="opacity:0">

  <!-- Profile -->
  <div class="profile-card">
    <div class="avatar" id="avatar"></div>
    <div class="name" id="pName"></div>
    <div class="sub" id="pSub"></div>
    <div class="tag-row" id="pTags"></div>
  </div>

  <!-- Tabs -->
  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="fitness">실기기록</button>
    <button class="tab-btn" data-tab="mock">모의고사</button>
    <button class="tab-btn" data-tab="gpa">내신환산</button>
  </div>

  <!-- Fitness Pane -->
  <div class="pane active" id="pane-fitness">
    <div class="section">
      <div class="sec-title"><span class="icon" style="background:var(--accent4)">🏃</span> 실기 테스트 기록</div>
      <div id="fitSummary"></div>
      <div id="fitTable"></div>
      <div id="fitCharts"></div>
    </div>
  </div>

  <!-- Mock Pane -->
  <div class="pane" id="pane-mock">
    <div class="section">
      <div class="sec-title"><span class="icon" style="background:var(--accent3)">📝</span> 모의고사 성적</div>
      <div id="mockContent"></div>
      <div id="mockCharts"></div>
    </div>
  </div>

  <!-- GPA Pane -->
  <div class="pane" id="pane-gpa">
    <div class="section">
      <div class="sec-title"><span class="icon" style="background:var(--accent5)">📊</span> 내신 환산 등급</div>
      <div id="gpaContent"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ── Config ── */
const SID='1JT-y2ZF6GLQD4ZYzP8yxFp6flxxc_F_vCMXGdY-gogs';
const sURL=n=>`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`;
const URLS={info:sURL('1.인적사항'),fitness:sURL('2.실기테스트'),mock:sURL('3.모의고사성적'),gpa:sURL('4.내신성적')};
const studentName=new URLSearchParams(location.search).get('name')||'권민진';
document.title=studentName+' - FINAL 학생 기록지';

/* ── CSV Parser ── */
function parseRow(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++}else if(c==='"'){inQ=false}else{cur+=c}}
    else{if(c==='"'){inQ=true}else if(c===','){r.push(cur.trim());cur=''}else{cur+=c}}
  }
  r.push(cur.trim());return r;
}
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const hdr=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,''));
  return lines.slice(1).map(l=>{const v=parseRow(l);const o={};hdr.forEach((h,i)=>o[h]=v[i]?v[i].replace(/^"|"$/g,''):'');return o;});
}

/* ── Helpers ── */
function fDate(d){if(!d)return'';const s=String(d);if(s.length===6)return'20'+s.slice(0,2)+'.'+s.slice(2,4)+'.'+s.slice(4,6);return s;}
const COLORS=['#4f46e5','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#14b8a6'];
function gClass(g){return 'g'+Math.min(Math.max(parseInt(g)||9,1),9)}

/* ── Fitness Items (6 items: each has 기록 col then 점수 col) ── */
const FIT_ITEMS=[
  {name:'배근력',recCol:'배근력 기록',scoreCol:'점수',unit:'kg'},
  {name:'10m왕복달리기',recCol:'10m왕복왕복달리기(부저) 기록',scoreCol:'점수',unit:'초',lower:true},
  {name:'메디신볼던지기',recCol:'메디신볼던지기(고무공) 기록',scoreCol:'점수',unit:'m'},
  {name:'좌전굴',recCol:'좌전굴 기록',scoreCol:'점수',unit:'cm'},
  {name:'제자리멀리뛰기',recCol:'제자리멀리뛰기 기록',scoreCol:'점수',unit:'cm'},
  {name:'20m왕복달리기',recCol:'20m왕복달리기(부저) 기록',scoreCol:'점수',unit:'회'}
];

/* ── Render Profile ── */
function renderProfile(info,fitCount,mockCount){
  const name=info['이름']||studentName;
  const cls=info['수강반']||'';
  document.getElementById('avatar').textContent=cls?cls.charAt(0):name.slice(-1);
  document.getElementById('pName').textContent=name;
  document.getElementById('pSub').textContent=(info['학교']||'')+' · '+(info['학년']||'');
  let tags='';
  if(cls) tags+=`<span class="tag cls">${cls}</span>`;
  if(info['성별']) tags+=`<span class="tag gen">${info['성별']}</span>`;
  if(fitCount>0) tags+=`<span class="tag fit">실기 ${fitCount}회</span>`;
  if(mockCount>0) tags+=`<span class="tag mock">모의고사 ${mockCount}회</span>`;
  document.getElementById('pTags').innerHTML=tags;
}

/* ── Render Fitness ── */
function renderFitness(csvText){
  const all=parseCSV(csvText);
  /* The CSV has paired columns: for each item, "XXX 기록" then "점수" repeated.
     Because headers have duplicate "점수", we need to parse by index. */
  
  // Re-parse to get raw headers with indices
  const lines=csvText.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){document.getElementById('fitTable').innerHTML='<p style="color:#aaa;text-align:center">실기 데이터가 없습니다.</p>';return 0;}
  const hdr=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,''));
  
  // Find column indices for each fitness item
  const fitCols=[];
  const recNames=['배근력 기록','10m왕복왕복달리기(부저) 기록','메디신볼던지기(고무공) 기록','좌전굴 기록','제자리멀리뛰기 기록','20m왕복달리기(부저) 기록'];
  recNames.forEach((rn,idx)=>{
    const ri=hdr.indexOf(rn);
    if(ri>=0) fitCols.push({name:FIT_ITEMS[idx].name,unit:FIT_ITEMS[idx].unit,lower:FIT_ITEMS[idx].lower||false,recIdx:ri,scoreIdx:ri+1});
  });
  
  // Parse all rows as arrays
  const rows=lines.slice(1).map(l=>{const v=parseRow(l);return v.map(c=>c.replace(/^"|"$/g,''));});
  
  // Find name column index and date column index
  const nameIdx=hdr.indexOf('이름');
  const dateIdx=hdr.indexOf('날짜');
  
  // Filter by student name
  const myRows=rows.filter(r=>r[nameIdx]===studentName);
  if(myRows.length===0){document.getElementById('fitTable').innerHTML='<p style="color:#aaa;text-align:center">해당 학생의 실기 데이터가 없습니다.</p>';return 0;}

  // Find total score columns (last two non-empty header columns)
  // Looking at the data, the last two data columns seem to be total score and average
  // Let's find them - they are after the last fitness item score column
  const lastFitScoreIdx=fitCols[fitCols.length-1].scoreIdx;
  // Skip empty columns after, find the total
  let totalIdx=-1,avgIdx=-1;
  for(let i=lastFitScoreIdx+1;i<hdr.length;i++){
    if(hdr[i]===''&&totalIdx<0)continue;
    if(totalIdx<0){totalIdx=i;continue;}
    if(avgIdx<0){avgIdx=i;break;}
  }
  // Actually from the data, it looks like after score columns there are empty columns, 
  // then the second-to-last and last columns have total and average
  // Let me just use the last two columns that have data in the first student row
  const testRow=myRows[0];
  const dataColsFromEnd=[];
  for(let i=testRow.length-1;i>lastFitScoreIdx;i--){
    if(testRow[i]!=='') dataColsFromEnd.push(i);
    if(dataColsFromEnd.length>=2)break;
  }
  if(dataColsFromEnd.length>=2){avgIdx=dataColsFromEnd[0];totalIdx=dataColsFromEnd[1];}
  else if(dataColsFromEnd.length===1){totalIdx=dataColsFromEnd[0];}

  // Build summary
  const dates=myRows.map(r=>fDate(r[dateIdx]));
  let latestTotal=totalIdx>=0?myRows[myRows.length-1][totalIdx]:'';
  let latestAvg=avgIdx>=0?myRows[myRows.length-1][avgIdx]:'';
  let firstTotal=totalIdx>=0?myRows[0][totalIdx]:'';
  let change=latestTotal&&firstTotal?((parseFloat(latestTotal)-parseFloat(firstTotal))).toFixed(1):'';

  let sumHTML='<div class="sum-grid">';
  sumHTML+=`<div class="sum-box"><div class="label">최신 총점</div><div class="val">${latestTotal||'-'}</div></div>`;
  sumHTML+=`<div class="sum-box"><div class="label">최신 평균</div><div class="val">${latestAvg||'-'}</div></div>`;
  sumHTML+=`<div class="sum-box"><div class="label">총점 변화</div><div class="val">${change?(parseFloat(change)>=0?'+':'')+change:'-'}</div></div>`;
  sumHTML+='</div>';
  document.getElementById('fitSummary').innerHTML=sumHTML;

  // Build table
  let tHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>날짜</th>';
  fitCols.forEach(fc=>{tHTML+=`<th>${fc.name}<br><span style="font-weight:400;font-size:10px;color:#aaa">기록</span></th><th><span style="font-size:10px;color:#aaa">점수</span></th>`;});
  if(totalIdx>=0)tHTML+='<th>총점</th>';
  tHTML+='</tr></thead><tbody>';

  myRows.forEach((r,ri)=>{
    tHTML+='<tr>';
    tHTML+=`<td style="font-weight:600">${fDate(r[dateIdx])}</td>`;
    fitCols.forEach(fc=>{
      const rec=r[fc.recIdx]||'';
      const sc=r[fc.scoreIdx]||'';
      // Change indicator compared to previous row
      let arrow='';
      if(ri>0){
        const prev=parseFloat(myRows[ri-1][fc.scoreIdx]);
        const cur=parseFloat(sc);
        if(!isNaN(prev)&&!isNaN(cur)){
          if(cur>prev)arrow='<span class="up"> ▲</span>';
          else if(cur<prev)arrow='<span class="dn"> ▼</span>';
          else arrow='<span class="same"> -</span>';
        }
      }
      tHTML+=`<td>${rec?rec+' '+fc.unit:'-'}</td><td>${sc||'-'}${arrow}</td>`;
    });
    if(totalIdx>=0)tHTML+=`<td style="font-weight:700">${r[totalIdx]||'-'}</td>`;
    tHTML+='</tr>';
  });
  tHTML+='</tbody></table></div>';
  document.getElementById('fitTable').innerHTML=tHTML;

  // Build Charts
  let cHTML='';
  const labels=myRows.map(r=>fDate(r[dateIdx]));

  // Total score chart
  if(totalIdx>=0){
    cHTML+=`<div class="chart-box"><h4>총점 변화 추이</h4><canvas id="chartTotal"></canvas></div>`;
  }

  // Individual item charts
  fitCols.forEach((fc,i)=>{
    cHTML+=`<div class="chart-box"><h4>${fc.name} (기록 변화)</h4><canvas id="chartFit${i}"></canvas></div>`;
  });

  document.getElementById('fitCharts').innerHTML=cHTML;

  // Draw total chart
  if(totalIdx>=0){
    const vals=myRows.map(r=>parseFloat(r[totalIdx])||0);
    new Chart(document.getElementById('chartTotal'),{
      type:'line',
      data:{labels,datasets:[{label:'총점',data:vals,borderColor:COLORS[0],backgroundColor:COLORS[0]+'22',fill:true,tension:.35,pointRadius:5,pointBackgroundColor:'#fff',pointBorderWidth:2.5,pointBorderColor:COLORS[0]}]},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'총점: '+c.parsed.y+'점'}}},scales:{y:{beginAtZero:false,grid:{color:'#f3f4f6'}},x:{grid:{display:false}}}}
    });
  }

  // Draw individual charts – X axis = 기록 value (label), Y axis = 점수
  fitCols.forEach((fc,i)=>{
    const recs=myRows.map(r=>r[fc.recIdx]?(r[fc.recIdx]+' '+fc.unit):'');
    const scores=myRows.map(r=>parseFloat(r[fc.scoreIdx])||0);
    // Use date as x-axis label, but show record in tooltip
    new Chart(document.getElementById('chartFit'+i),{
      type:'line',
      data:{labels,datasets:[{
        label:fc.name+' 점수',data:scores,
        borderColor:COLORS[i%COLORS.length],backgroundColor:COLORS[i%COLORS.length]+'22',
        fill:true,tension:.35,pointRadius:5,pointBackgroundColor:'#fff',pointBorderWidth:2.5,pointBorderColor:COLORS[i%COLORS.length]
      }]},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
        plugins:{legend:{display:false},tooltip:{callbacks:{
          title:ctx=>{const idx=ctx[0].dataIndex;return fDate(myRows[idx][dateIdx]);},
          label:ctx=>{const idx=ctx.dataIndex;return `기록: ${recs[idx]} / 점수: ${scores[idx]}`;}
        }}},
        scales:{y:{beginAtZero:false,grid:{color:'#f3f4f6'},title:{display:true,text:'점수',font:{size:11}}},x:{grid:{display:false}}}
      }
    });
  });

  return myRows.length;
}

/* ── Render Mock ── */
function renderMock(csvText){
  const lines=csvText.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){document.getElementById('mockContent').innerHTML='<p style="color:#aaa;text-align:center">모의고사 데이터가 없습니다.</p>';return 0;}
  const hdr=parseRow(lines[0]).map(h=>h.replace(/^"|"$/g,''));
  const rows=lines.slice(1).map(l=>parseRow(l).map(c=>c.replace(/^"|"$/g,'')));
  
  const nameIdx=hdr.indexOf('이름');
  const catIdx=hdr.indexOf('구분');
  const myRows=rows.filter(r=>r[nameIdx]===studentName);
  if(myRows.length===0){document.getElementById('mockContent').innerHTML='<p style="color:#aaa;text-align:center">해당 학생의 모의고사 데이터가 없습니다.</p>';return 0;}

  /* Column structure (verified from actual CSV):
     0: 구분
     1: 이름
     2: 성별
     3: 학교
     4: 학년
     5: 국어 과목
     6: 원점수
     7: 표준점수
     8: 백분위
     9: 등급
     10: 수학 과목
     11: 원점수
     12: 표준점수
     13: 백분위
     14: 등급
     15: 영어 원점수
     16: 등급
     17: 탐구1 과목
     18: 원점수
     19: 표준점수
     20: 백분위
     21: 등급
     22: 탐구2 과목
     23: 원점수
     24: 표준점수
     25: 백분위
     26: 등급
     27: 한국사 원점수
     28: 등급
  */

  const SUBJ_MAP=[
    {name:'국어',subjectIdx:5,rawIdx:6,stdIdx:7,pctIdx:8,gradeIdx:9},
    {name:'수학',subjectIdx:10,rawIdx:11,stdIdx:12,pctIdx:13,gradeIdx:14},
    {name:'영어',subjectIdx:-1,rawIdx:15,stdIdx:-1,pctIdx:-1,gradeIdx:16},
    {name:'탐구1',subjectIdx:17,rawIdx:18,stdIdx:19,pctIdx:20,gradeIdx:21},
    {name:'탐구2',subjectIdx:22,rawIdx:23,stdIdx:24,pctIdx:25,gradeIdx:26},
    {name:'한국사',subjectIdx:-1,rawIdx:27,stdIdx:-1,pctIdx:-1,gradeIdx:28}
  ];

  let html='';

  myRows.forEach((r,ri)=>{
    const examName=r[catIdx]||('시험 '+(ri+1));
    html+=`<div class="card"><h4 style="font-size:14px;font-weight:700;margin-bottom:12px">${examName}</h4>`;
    
    // Grade cards
    html+='<div class="mock-grid">';
    SUBJ_MAP.forEach(s=>{
      const grade=r[s.gradeIdx]||'';
      const raw=r[s.rawIdx]||'';
      const subjDetail=s.subjectIdx>=0?(r[s.subjectIdx]||''):'';
      const pct=s.pctIdx>=0?(r[s.pctIdx]||''):'';
      
      if(!grade&&!raw){
        html+=`<div class="mock-card empty"><div class="subj-name">${s.name}</div><div class="subj-detail">&nbsp;</div><div class="grade">-</div><div class="extra">미응시</div></div>`;
      } else {
        html+=`<div class="mock-card"><div class="subj-name">${s.name}</div><div class="subj-detail">${subjDetail}</div><div class="grade ${gClass(grade)}">${grade||'-'}</div><div class="extra">${raw?'원점수 '+raw:''}${pct?' / 백분위 '+pct:''}</div></div>`;
      }
    });
    html+='</div>';

    // Detailed table
    html+='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>과목</th><th>선택과목</th><th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th></tr></thead><tbody>';
    SUBJ_MAP.forEach(s=>{
      const grade=r[s.gradeIdx]||'-';
      const raw=r[s.rawIdx]||'-';
      const std=s.stdIdx>=0?(r[s.stdIdx]||'-'):'-';
      const pct=s.pctIdx>=0?(r[s.pctIdx]||'-'):'-';
      const detail=s.subjectIdx>=0?(r[s.subjectIdx]||'-'):'-';
      html+=`<tr><td style="font-weight:600">${s.name}</td><td>${detail}</td><td>${raw}</td><td>${std}</td><td>${pct}</td><td class="${gClass(grade)}" style="font-weight:800">${grade}</td></tr>`;
    });
    html+='</tbody></table></div>';
    html+='</div>';
  });

  document.getElementById('mockContent').innerHTML=html;

  // Charts: one chart per subject showing grade trend
  if(myRows.length>=1){
    let cHTML='';
    const examLabels=myRows.map(r=>r[catIdx]||'');

    // Overall grade chart (all subjects in one)
    cHTML+=`<div class="chart-box"><h4>과목별 등급 추이 (종합)</h4><canvas id="chartMockAll"></canvas></div>`;

    // Individual subject charts
    SUBJ_MAP.forEach((s,i)=>{
      cHTML+=`<div class="chart-box"><h4>${s.name} 등급 추이</h4><canvas id="chartMock${i}"></canvas></div>`;
    });

    document.getElementById('mockCharts').innerHTML=cHTML;

    // Draw combined chart
    const allDatasets=SUBJ_MAP.map((s,i)=>{
      const grades=myRows.map(r=>parseInt(r[s.gradeIdx])||null);
      return {label:s.name,data:grades,borderColor:COLORS[i%COLORS.length],backgroundColor:COLORS[i%COLORS.length]+'22',tension:.3,pointRadius:5,pointBackgroundColor:'#fff',pointBorderWidth:2.5,pointBorderColor:COLORS[i%COLORS.length],spanGaps:true};
    });
    new Chart(document.getElementById('chartMockAll'),{
      type:'line',data:{labels:examLabels,datasets:allDatasets},
      options:{responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},usePointStyle:true,pointStyle:'circle'}}},
        scales:{y:{reverse:true,min:1,max:9,ticks:{stepSize:1},title:{display:true,text:'등급',font:{size:11}},grid:{color:'#f3f4f6'}},x:{grid:{display:false}}}
      }
    });

    // Draw individual subject charts
    SUBJ_MAP.forEach((s,i)=>{
      const grades=myRows.map(r=>parseInt(r[s.gradeIdx])||null);
      const datasets=[{label:s.name+' 등급',data:grades,borderColor:COLORS[i%COLORS.length],backgroundColor:COLORS[i%COLORS.length]+'22',fill:true,tension:.3,pointRadius:5,pointBackgroundColor:'#fff',pointBorderWidth:2.5,pointBorderColor:COLORS[i%COLORS.length],spanGaps:true}];
      
      // If subject has percentile, add as secondary axis
      const opts={responsive:true,maintainAspectRatio:true,aspectRatio:1.8,
        plugins:{legend:{position:'bottom',labels:{font:{size:11},usePointStyle:true,pointStyle:'circle'}},
          tooltip:{callbacks:{
            afterLabel:ctx=>{
              const idx=ctx.dataIndex;
              const detail=s.subjectIdx>=0?myRows[idx][s.subjectIdx]:'';
              const raw=myRows[idx][s.rawIdx]||'';
              let t='';
              if(detail)t+='선택: '+detail+'\n';
              if(raw)t+='원점수: '+raw;
              return t;
            }
          }}
        },
        scales:{y:{reverse:true,min:1,max:9,ticks:{stepSize:1},title:{display:true,text:'등급',font:{size:11}},grid:{color:'#f3f4f6'}},x:{grid:{display:false}}}
      };

      if(s.pctIdx>=0){
        const pcts=myRows.map(r=>parseInt(r[s.pctIdx])||null);
        datasets.push({label:'백분위',data:pcts,borderColor:'#9ca3af',borderDash:[4,4],backgroundColor:'transparent',tension:.3,pointRadius:4,pointBackgroundColor:'#fff',pointBorderWidth:2,pointBorderColor:'#9ca3af',yAxisID:'yPct',spanGaps:true});
        opts.scales.yPct={position:'right',min:0,max:100,grid:{display:false},title:{display:true,text:'백분위',font:{size:11}},ticks:{font:{size:10}}};
      }

      new Chart(document.getElementById('chartMock'+i),{type:'line',data:{labels:examLabels,datasets},options:opts});
    });
  }

  return myRows.length;
}

/* ── Render GPA ── */
function renderGPA(gpa){
  const fields=[
    {key:'전과목',label:'전과목'},
    {key:'국영',label:'국영'},
    {key:'국수영',label:'국수영'},
    {key:'국수영사',label:'국수영사'},
    {key:'국수영과',label:'국수영과'},
    {key:'영탐',label:'영탐'}
  ];
  let html='<div class="gpa-grid">';
  let hasAny=false;
  fields.forEach(f=>{
    const v=gpa[f.key]||'';
    if(v)hasAny=true;
    html+=`<div class="gpa-box"><div class="gpa-label">${f.label}</div><div class="gpa-val${v?'':' empty'}">${v||'-'}</div></div>`;
  });
  html+='</div>';
  if(!hasAny) html='<p style="color:#aaa;text-align:center;padding:20px">내신 데이터가 아직 입력되지 않았습니다.</p>';
  document.getElementById('gpaContent').innerHTML=html;
}

/* ── Tabs ── */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-'+btn.dataset.tab).classList.add('active');
  });
});

/* ── Load Data ── */
(async()=>{
  try{
    const [iT,fT,mT,gT]=await Promise.all([
      fetch(URLS.info).then(r=>{if(!r.ok)throw new Error('info fetch fail');return r.text();}),
      fetch(URLS.fitness).then(r=>{if(!r.ok)throw new Error('fitness fetch fail');return r.text();}),
      fetch(URLS.mock).then(r=>{if(!r.ok)throw new Error('mock fetch fail');return r.text();}),
      fetch(URLS.gpa).then(r=>{if(!r.ok)throw new Error('gpa fetch fail');return r.text();})
    ]);

    const allInfo=parseCSV(iT);
    const info=allInfo.find(r=>r['이름']===studentName)||{};
    const allGpa=parseCSV(gT);
    const gpa=allGpa.find(r=>r['이름']===studentName)||{};

    const fitCount=renderFitness(fT);
    const mockCount=renderMock(mT);
    renderProfile(info,fitCount,mockCount);
    renderGPA(gpa);
  }catch(e){
    console.error('Load error:',e);
    document.getElementById('loading').innerHTML='<p class="err-msg">데이터를 불러오지 못했습니다.<br>새로고침 하거나 잠시 후 다시 시도해 주세요.<br><small>'+e.message+'</small></p>';
    return;
  }
  document.getElementById('loading').classList.add('hide');
  document.getElementById('app').style.transition='opacity .5s';
  document.getElementById('app').style.opacity='1';
})();
</script>
