<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FINAL 파이널체대입시 - 학생 기록지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#111827;--accent:#4f46e5;--accent2:#ec4899;--accent3:#06b6d4;--accent4:#10b981;--accent5:#f59e0b;--bg:#f3f4f6;--card:#fff;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--primary);min-height:100vh;-webkit-font-smoothing:antialiased}
#loading{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.ld-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#666;margin-top:12px;font-size:12px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 28px;width:100%;max-width:380px;text-align:center}
.login-logo{margin-bottom:8px}.login-logo img{height:30px}.login-logo .logo-text{font-size:20px;font-weight:900;letter-spacing:-1px}
.login-campus{display:inline-block;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;margin-bottom:24px}
.login-sub{font-size:12px;color:#9ca3af;margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;font-family:inherit;text-align:center;letter-spacing:8px;font-weight:700;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--accent)}.login-input::placeholder{letter-spacing:0;font-weight:400;font-size:13px;color:#d1d5db}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;transition:opacity .2s}
.login-btn:active{opacity:.8}
.login-error{color:var(--accent2);font-size:12px;margin-top:12px;min-height:18px;font-weight:600}
.login-name{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.profile-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.profile-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f0f4}
.profile-header-left{display:flex;align-items:center;gap:10px}
.profile-header img{height:26px}.profile-header .logo-text{font-size:17px;font-weight:900;letter-spacing:-1px;color:var(--primary)}
.campus-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.3px}
.profile-body{padding:20px;display:flex;align-items:center;gap:14px}
.p-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(79,70,229,.25);letter-spacing:-0.5px}
.p-info{flex:1}.p-name{font-size:20px;font-weight:800;color:var(--primary);letter-spacing:-.5px}.p-sub{font-size:12px;color:#9ca3af;margin-top:2px}
.profile-footer{padding:0 20px 16px;display:flex;gap:6px;flex-wrap:wrap}
.p-tag{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;padding:4px 11px;font-size:10px;color:#6b7280;font-weight:500}
.p-tag b{color:var(--accent);font-weight:700}
.p-tag.class-tag{background:#eef2ff;border-color:#c7d2fe;color:var(--accent);font-weight:700}
.tab-wrap{background:#fff;border-radius:12px;padding:4px;margin-bottom:16px;display:flex;gap:4px;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:10px 0;border:none;border-radius:10px;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:#9ca3af;font-family:inherit;transition:all .2s;text-align:center}
.tab-btn.on{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tab-btn:active{transform:scale(.97)}
.pane{display:none}.pane.on{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--accent2)}.dot-purple{background:var(--accent)}.dot-blue{background:var(--accent3)}.dot-green{background:var(--accent4)}.dot-yellow{background:var(--accent5)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid #f0f0f4;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.stat-box .sl{font-size:10px;color:#9ca3af;margin-bottom:2px;font-weight:500}.stat-box .sv{font-size:20px;font-weight:800;color:var(--primary)}.stat-box .su{font-size:9px;color:#d1d5db;margin-top:1px}
.sv.up{color:var(--accent2)}.sv.dn{color:var(--accent3)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -20px;padding:0 20px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:580px}
.tbl th{background:#f9fafb;padding:10px 8px;text-align:center;font-weight:600;color:#6b7280;border-bottom:2px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;font-size:10px}
.tbl td{padding:10px 8px;text-align:center;border-bottom:1px solid #f3f4f6;color:#374151;font-size:11px}
.tbl tbody tr:hover{background:#f9fafb}.tbl .dt{color:#9ca3af;font-size:10px;font-weight:500}
.chg-up{display:inline-block;color:#ec4899;font-weight:700;font-size:9px;background:#fdf2f8;padding:1px 5px;border-radius:4px;margin-top:2px}
.chg-dn{display:inline-block;color:#06b6d4;font-weight:700;font-size:9px;background:#ecfeff;padding:1px 5px;border-radius:4px;margin-top:2px}
.mock-list{display:flex;flex-direction:column;gap:10px}
.m-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #f0f0f4;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.m-card .m-exam{font-size:14px;font-weight:700;margin-bottom:10px}
.m-subjects{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.m-subj{background:#f9fafb;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid #e5e7eb;display:flex;flex-direction:column;justify-content:center;min-height:90px}
.m-subj .ms-name{font-size:9px;color:#9ca3af;margin-bottom:3px;font-weight:500;min-height:24px;display:flex;align-items:center;justify-content:center}
.m-subj .ms-grade{font-size:20px;font-weight:800}.m-subj .ms-detail{font-size:9px;color:#9ca3af;margin-top:2px;min-height:14px}
.mg1{color:#4f46e5}.mg2{color:#06b6d4}.mg3{color:#10b981}.mg4{color:#f59e0b}.mg5{color:#f97316}.mg6{color:#ef4444}.mg7{color:#dc2626}.mg8{color:#991b1b}.mg9{color:#6b7280}
.mock-detail-list{display:flex;flex-direction:column;gap:8px}
.mock-detail-exam{background:#f9fafb;border-radius:12px;padding:14px;border:1px solid #f0f0f4}
.mock-detail-exam .mde-title{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.mock-detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6}
.mock-detail-row:last-child{border-bottom:none}
.mdr-left{display:flex;align-items:center;gap:8px}.mdr-subj{font-size:12px;font-weight:700;color:var(--primary);min-width:42px}
.mdr-select{font-size:10px;color:#9ca3af;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mdr-right{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280}.mdr-right span{min-width:32px;text-align:right}
.mdr-grade{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;border-radius:50%;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.mdr-grade.gb1{background:#4f46e5}.mdr-grade.gb2{background:#06b6d4}.mdr-grade.gb3{background:#10b981}.mdr-grade.gb4{background:#f59e0b}.mdr-grade.gb5{background:#f97316}.mdr-grade.gb6{background:#ef4444}.mdr-grade.gb7{background:#dc2626}.mdr-grade.gb8{background:#991b1b}.mdr-grade.gb9{background:#6b7280}
.mdr-label{font-size:9px;color:#d1d5db;min-width:24px}
.gpa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.gpa-card{background:#f9fafb;border-radius:14px;padding:20px 14px;text-align:center;border:1px solid #f0f0f4}
.gpa-card .gc-label{font-size:10px;color:#9ca3af;margin-bottom:6px;font-weight:500}
.gpa-card .gc-val{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gpa-card .gc-sub{font-size:9px;color:#d1d5db;margin-top:3px}
.chart-box{position:relative;height:220px;margin-top:8px}

/* ── 지원현황 ── */
.univ-list{display:flex;flex-direction:column;gap:10px}
.univ-card{background:#fff;border-radius:14px;padding:16px;border:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(0,0,0,.03);cursor:pointer;transition:all .2s}
.univ-card:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.univ-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.univ-name{font-size:15px;font-weight:800;color:var(--primary)}
.univ-type{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:#eef2ff;color:var(--accent)}
.univ-dept{font-size:12px;color:#6b7280;margin-bottom:6px}
.univ-score{font-size:11px;color:#9ca3af}.univ-score b{color:var(--accent);font-weight:800;font-size:14px}
.univ-arrow{font-size:10px;color:#d1d5db;margin-top:6px;text-align:right}

/* ── 대학 상세 ── */
.univ-detail{display:none}
.univ-detail.on{display:block}
.univ-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:12px;font-weight:700;color:var(--primary);cursor:pointer;margin-bottom:14px;font-family:inherit}
.univ-back:active{background:#f3f4f6}
.univ-detail-header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center}
.udh-name{font-size:20px;font-weight:900;margin-bottom:2px}
.udh-dept{font-size:13px;opacity:.85;margin-bottom:4px}
.udh-type{display:inline-block;background:rgba(255,255,255,.2);padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700}
.udh-score{font-size:32px;font-weight:900;margin-top:12px}
.udh-score-label{font-size:11px;opacity:.7;margin-top:2px}
.univ-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.ui-item{background:#f9fafb;border-radius:12px;padding:12px;text-align:center;border:1px solid #f0f0f4}
.ui-label{font-size:10px;color:#9ca3af;margin-bottom:4px;font-weight:500}
.ui-val{font-size:14px;font-weight:800;color:var(--primary)}
.univ-record-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.ur-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ur-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.ur-row:last-child{border-bottom:none}
.ur-date{color:#9ca3af;font-size:11px;min-width:60px}.ur-type{color:#6b7280;font-size:10px;min-width:70px}
.ur-scores{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.ur-scores span{font-size:11px;color:#374151}.ur-total{font-weight:800;color:var(--accent);font-size:13px}
.ur-item-card{background:#f9fafb;border-radius:10px;padding:10px 12px;margin-bottom:6px;border:1px solid #f0f0f4}
.ur-item-name{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px}
.ur-item-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:#6b7280}
.ur-item-row .val{font-weight:700;color:var(--primary)}

@media(max-width:400px){
  .wrap{padding:10px}.profile-body{padding:16px}.p-name{font-size:18px}
  .stat-grid{grid-template-columns:repeat(3,1fr);gap:6px}.stat-box{padding:10px 6px}.stat-box .sv{font-size:17px}
  .tab-btn{font-size:10px;padding:8px 0}.chart-box{height:180px}
  .profile-header img{height:22px}.m-subjects{grid-template-columns:repeat(3,1fr)}
  .login-card{padding:30px 20px}
}
@media(min-width:641px){.stat-grid{grid-template-columns:repeat(4,1fr)}.m-subjects{grid-template-columns:repeat(6,1fr)}.univ-info-grid{grid-template-columns:repeat(3,1fr)}}
@media print{body{background:#fff}.tab-wrap{display:none}.pane{display:block!important}}
.no-data{text-align:center;padding:30px;color:#d1d5db;font-size:13px}
.err-msg{color:var(--accent2);text-align:center;padding:40px;font-size:13px}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><img src="./logo.png" alt="FINAL" onerror="this.outerHTML='<span class=logo-text>FINAL</span>'"></div>
    <span class="login-campus">동탄캠퍼스</span>
    <div class="login-name" id="loginName">불러오는 중...</div>
    <div class="login-sub">개인 기록지를 열람하려면<br>비밀번호를 입력하세요</div>
    <input type="password" class="login-input" id="pwInput" placeholder="비밀번호" maxlength="20" inputmode="numeric">
    <button class="login-btn" id="loginBtn">확인</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<div id="loading" style="display:none"><div class="ld-ring"></div><p>기록지를 불러오고 있습니다</p></div>

<div class="wrap" id="app" style="display:none">
  <div class="profile-card">
    <div class="profile-header"><div class="profile-header-left"><img src="./logo.png" alt="FINAL 파이널체대입시" onerror="this.outerHTML='<span class=logo-text>FINAL 파이널체대입시</span>'"></div><span class="campus-badge">동탄캠퍼스</span></div>
    <div class="profile-body"><div class="p-avatar" id="av"></div><div class="p-info"><div class="p-name" id="pName">-</div><div class="p-sub" id="pSub"></div></div></div>
    <div class="profile-footer" id="pTags"></div>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn on" data-t="fitness">실기기록</button>
    <button class="tab-btn" data-t="mock">모의고사</button>
    <button class="tab-btn" data-t="gpa">내신환산</button>
    <button class="tab-btn" data-t="univ">지원현황</button>
  </div>

  <div class="pane on" id="p-fitness">
    <div class="stat-grid" id="fitStats"></div>
    <div class="card"><div class="card-title"><span class="dot dot-red"></span>실기 테스트 기록</div><div class="tbl-wrap"><table class="tbl"><thead><tr id="fitH"></tr></thead><tbody id="fitB"></tbody></table></div><div class="no-data" id="fitNone" style="display:none">실기 데이터가 없습니다.</div></div>
    <div class="card"><div class="card-title"><span class="dot dot-red"></span>총점 변화</div><div class="chart-box"><canvas id="fitTotalChart"></canvas></div></div>
    <div id="fitItemCharts"></div>
  </div>

  <div class="pane" id="p-mock">
    <div class="stat-grid" id="mockStats"></div>
    <div class="mock-list" id="mockList"></div>
    <div class="no-data" id="mockNone" style="display:none">모의고사 데이터가 없습니다.</div>
    <div class="card" style="margin-top:12px"><div class="card-title"><span class="dot dot-purple"></span>시험별 상세</div><div id="mockDetail"></div></div>
    <div class="card"><div class="card-title"><span class="dot dot-purple"></span>전체 등급 변화</div><div class="chart-box"><canvas id="mockAllChart"></canvas></div></div>
    <div id="mockSubjCharts"></div>
  </div>

  <div class="pane" id="p-gpa">
    <div class="card"><div class="card-title"><span class="dot dot-blue"></span>내신 성적</div><div class="gpa-grid" id="gpaGrid"></div><div class="no-data" id="gpaNone" style="display:none">내신 데이터가 없습니다.</div></div>
  </div>

  <div class="pane" id="p-univ">
    <div id="univListView">
      <div class="univ-list" id="univList"></div>
      <div class="no-data" id="univNone" style="display:none">지원현황 데이터가 없습니다.</div>
    </div>
    <div class="univ-detail" id="univDetail"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SID='1JT-y2ZF6GLQD4ZYzP8yxFp6flxxc_F_vCMXGdY-gogs';
const UNIV_SID='1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';
const sURL=(id,n)=>'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(n);
const URLS={
  info:sURL(SID,'1.인적사항'),fitness:sURL(SID,'2.실기테스트'),mock:sURL(SID,'3.모의고사성적'),
  gpa:sURL(SID,'4.내신성적'),apply:sURL(SID,'5.지원현황'),univInfo:sURL(SID,'6.대학정보')
};

const studentId=new URLSearchParams(location.search).get('id')||'';
let studentName='',studentSchool='';

function parseRow(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}
function parseCSV(t){const ls=t.split('\n').filter(l=>l.trim());if(ls.length<2)return[];const h=parseRow(ls[0]);return ls.slice(1).map(l=>{const c=parseRow(l);const o={};h.forEach((k,i)=>o[k]=c[i]||'');return o})}
function fDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');if(s.length<6)return d;return s.substring(2,4)+'.'+s.substring(4,6)}
function fullDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');if(s.length<6)return d;return'20'+s.substring(0,2)+'.'+s.substring(2,4)+'.'+s.substring(4,6)}
function makeLineOpts(reverse){
  return{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12,family:'Noto Sans KR'},bodyFont:{size:11,family:'Noto Sans KR'},padding:10,cornerRadius:8,displayColors:true}},
    scales:{y:Object.assign({grid:{color:'#f3f4f6'},ticks:{font:{size:10}}},reverse?{reverse:true,min:1,max:9,ticks:{stepSize:1,font:{size:10}}}:{beginAtZero:false}),x:{grid:{display:false},ticks:{font:{size:10}}}}};
}
function findById(data,id){const t=parseInt(id);if(isNaN(t))return null;return data.find(r=>{const n=parseInt(String(r['no']).replace(/\D/g,''));return n===t})||null}

let allInfoData=[],allUnivInfo=[];

async function initLogin(){
  if(!studentId){document.getElementById('loginName').textContent='';document.getElementById('loginErr').textContent='잘못된 접속입니다.';document.getElementById('pwInput').style.display='none';document.getElementById('loginBtn').style.display='none';return}
  try{
    const res=await fetch(URLS.info);const text=await res.text();allInfoData=parseCSV(text);
    const me=findById(allInfoData,studentId);
    if(!me){document.getElementById('loginName').textContent='';document.getElementById('loginErr').textContent='존재하지 않는 학생 번호입니다.';document.getElementById('pwInput').style.display='none';document.getElementById('loginBtn').style.display='none';return}
    document.getElementById('loginName').textContent=me['이름'];studentName=me['이름'];studentSchool=me['학교']||'';

  }catch(e){document.getElementById('loginName').textContent='';document.getElementById('loginErr').textContent='데이터를 불러올 수 없습니다.';}

function tryLogin(){
  const pw=document.getElementById('pwInput').value.trim();
  if(!pw){document.getElementById('loginErr').textContent='비밀번호를 입력하세요.';return}
  const me=findById(allInfoData,studentId);if(!me){document.getElementById('loginErr').textContent='오류가 발생했습니다.';return}
  if(String(me['비밀번호']).trim()!==pw){document.getElementById('loginErr').textContent='비밀번호가 틀렸습니다.';document.getElementById('pwInput').value='';document.getElementById('pwInput').focus();return}
  studentName=me['이름'];studentSchool=me['학교']||'';
  document.getElementById('loginScreen').style.display='none';document.getElementById('loading').style.display='flex';loadRecords(me);
}
document.getElementById('loginBtn').addEventListener('click',tryLogin);
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin()});

async function loadRecords(info){
  try{
    const [fT,mT,gT,aT,uT]=await Promise.all([
      fetch(URLS.fitness).then(r=>r.text()),fetch(URLS.mock).then(r=>r.text()),
      fetch(URLS.gpa).then(r=>r.text()),fetch(URLS.apply).then(r=>r.text()),
      fetch(URLS.univInfo).then(r=>r.text())
    ]);
    const gpa=(parseCSV(gT).find(r=>r['이름']===studentName&&r['학교']===studentSchool))||{};

function renderUnivList(raw){
  const data=parseCSV(raw);
  const me=data.find(r=>{const n=parseInt(String(r['no']).replace(/\D/g,''));return n===parseInt(studentId)});
  if(!me){document.getElementById('univNone').style.display='';return}
  const univs=[];
  for(let i=1;i<=8;i++){
    const uName=me['대학'+i],dept=me['학과'+i];
    if(!uName)continue;
    univs.push({name:uName,dept:dept||'',type:me['구분']||'',score:me['환산점수']||'',idx:i});
  }
  if(!univs.length){document.getElementById('univNone').style.display='';return}

  /* ★ 5.지원현황의 "구분" 헤더가 중복이므로 raw 파싱으로 인덱스 접근 */
  const lines=raw.split('\n').filter(l=>l.trim());
  const headerRow=parseRow(lines[0]);
  const meRow=lines.slice(1).map(l=>parseRow(l)).find(r=>{const n=parseInt(String(r[0]).replace(/\D/g,''));return n===parseInt(studentId)});

  const list=document.getElementById('univList');
  const colors=['#4f46e5','#ec4899','#06b6d4','#10b981','#f59e0b','#8b5cf6','#ef4444','#f97316'];

  univs.forEach((u,idx)=>{
    /* 열 인덱스: 6+(idx*4)=대학, +1=학과, +2=구분, +3=환산점수 */
    const baseIdx=6+(idx*4);
    const uType=meRow?meRow[baseIdx+2]||'':'';
    const uScore=meRow?meRow[baseIdx+3]||'':'';

    const card=document.createElement('div');card.className='univ-card';
    card.style.borderLeft='4px solid '+colors[idx%colors.length];
    card.innerHTML='<div class="univ-card-top"><span class="univ-name">'+u.name+'</span>'+(uType?'<span class="univ-type">'+uType+'</span>':'')+'</div>'+
      '<div class="univ-dept">'+u.dept+'</div>'+
      (uScore?'<div class="univ-score">환산점수 <b>'+uScore+'</b></div>':'')+
      '<div class="univ-arrow">상세보기 →</div>';
    card.addEventListener('click',()=>showUnivDetail(u.name,u.dept,uType,uScore,colors[idx%colors.length]));
    list.appendChild(card);
  });
}

async function showUnivDetail(univName,dept,type,score,color){
  const listView=document.getElementById('univListView');
  const detailView=document.getElementById('univDetail');
  listView.style.display='none';detailView.className='univ-detail on';
  detailView.innerHTML='<div style="text-align:center;padding:40px;color:#9ca3af">불러오는 중...</div>';

  /* 6.대학정보에서 매칭 */
  const info=allUnivInfo.find(r=>r['대학명']===univName&&r['학과']===dept)||{};

  /* 대학별 시트 탭명 = 대학명+학과명 (공백 제거) */
  const tabName=(univName+dept).replace(/\s/g,'');
  let records=[],headers=[];
  try{
    const res=await fetch(sURL(UNIV_SID,tabName));
    const text=await res.text();
    const allLines=text.split('\n').filter(l=>l.trim());
    if(allLines.length>=2){
      headers=parseRow(allLines[0]);
      for(let i=1;i<allLines.length;i++){
        const c=parseRow(allLines[i]);
        if(c[2]===studentName&&c[4]===studentSchool)records.push(c);
      }
    }
  }catch(e){console.log('대학 시트 로드 실패:',tabName)}

  /* 헤더 분석: 8번 이후 ~ 총점 전까지 종목 파악 */
  const totalIdx=headers.findIndex(h=>h==='총점');
  const eventHeaders=headers.slice(8,totalIdx>8?totalIdx:headers.length);
  const events=[];
  let ei=0;
  while(ei<eventHeaders.length){
    const name=eventHeaders[ei];
    if(!name){ei++;continue}
    if(ei+1<eventHeaders.length&&eventHeaders[ei+1]==='환산점수'){
      events.push({name,hasScore:true,recIdx:8+ei,scoreIdx:8+ei+1});ei+=2;
    }else{
      events.push({name,hasScore:false,recIdx:8+ei,scoreIdx:-1});ei++
    }
  }
  const totalColIdx=totalIdx>=0?totalIdx:headers.length-1;

  /* 유효 기록만 필터 (이름 있고 총점이나 종목 데이터가 있는 행) */
  const validRecords=records.filter(r=>r[2]&&(r[totalColIdx]||events.some(ev=>r[ev.recIdx])));
  validRecords.sort((a,b)=>{
    const da=(a[1]||'').replace(/\D/g,''),db=(b[1]||'').replace(/\D/g,'');
    return da.localeCompare(db);
  });

  let html='<button class="univ-back" onclick="hideUnivDetail()">← 목록으로</button>';

  /* 헤더 카드 */
  html+='<div class="univ-detail-header" style="background:linear-gradient(135deg,'+color+','+color+'aa)">'+
    '<div class="udh-name">'+univName+'</div><div class="udh-dept">'+dept+'</div>'+
    (type?'<div class="udh-type">'+type+'</div>':'')+
    (score?'<div class="udh-score">'+score+'</div><div class="udh-score-label">환산점수</div>':'')+
    '</div>';

  /* 대학 정보 (6.대학정보) */
  if(Object.keys(info).length>1){
    html+='<div class="univ-info-grid">';
    if(info['모집인원'])html+='<div class="ui-item"><div class="ui-label">모집인원</div><div class="ui-val">'+info['모집인원']+'명</div></div>';
    if(info['실기종목'])html+='<div class="ui-item"><div class="ui-label">실기종목</div><div class="ui-val" style="font-size:11px">'+info['실기종목']+'</div></div>';
    if(info['내신'])html+='<div class="ui-item"><div class="ui-label">내신배점</div><div class="ui-val">'+info['내신']+'</div></div>';
    if(info['실기'])html+='<div class="ui-item"><div class="ui-label">실기배점</div><div class="ui-val">'+info['실기']+'</div></div>';
    if(info['수능'])html+='<div class="ui-item"><div class="ui-label">수능</div><div class="ui-val">'+info['수능']+'</div></div>';
    if(info['총점'])html+='<div class="ui-item"><div class="ui-label">총점</div><div class="ui-val">'+info['총점']+'</div></div>';
    if(info['전년도 경쟁률'])html+='<div class="ui-item"><div class="ui-label">전년도 경쟁률</div><div class="ui-val" style="font-size:12px">'+info['전년도 경쟁률']+'</div></div>';
    if(info['전년도 모집인원'])html+='<div class="ui-item"><div class="ui-label">전년도 모집</div><div class="ui-val">'+info['전년도 모집인원']+'명</div></div>';
    if(info['전년도예비충원'])html+='<div class="ui-item"><div class="ui-label">전년도 예비충원</div><div class="ui-val">'+info['전년도예비충원']+'명</div></div>';
    html+='</div>';
  }

  /* 기록 목록 */
  if(validRecords.length){
    html+='<div class="univ-record-card"><div class="ur-title"><span class="dot" style="background:'+color+'"></span>실기 기록 ('+validRecords.length+'회)</div>';
    validRecords.forEach(r=>{
      html+='<div class="ur-row"><span class="ur-date">'+r[1]+'</span><span class="ur-type">'+r[0]+'</span><span class="ur-total">'+(r[totalColIdx]||'-')+'</span></div>';
    });
    html+='</div>';

    /* 종목별 상세 */
    events.forEach(ev=>{
      const hasData=validRecords.some(r=>r[ev.recIdx]&&r[ev.recIdx]!=='0');
      if(!hasData)return;
      html+='<div class="univ-record-card"><div class="ur-title"><span class="dot" style="background:'+color+'"></span>'+ev.name+'</div>';
      validRecords.forEach(r=>{
        const val=r[ev.recIdx]||'-';
        const sc=ev.hasScore?(r[ev.scoreIdx]||'-'):'';
        if(val==='-'&&sc==='-')return;
        html+='<div class="ur-item-row"><span>'+r[1]+' ('+r[0]+')</span><span class="val">'+val+(ev.hasScore?' → '+sc+'점':'')+'</span></div>';
      });
      html+='</div>';
    });

    /* 총점 변화 차트 */
    const chartRecords=validRecords.filter(r=>r[totalColIdx]&&parseFloat(r[totalColIdx])>0);
    if(chartRecords.length>=2){
      html+='<div class="card"><div class="card-title"><span class="dot" style="background:'+color+'"></span>총점 변화</div><div class="chart-box"><canvas id="univTotalChart"></canvas></div></div>';
    }
  }else{
    html+='<div class="no-data">아직 기록이 없습니다.</div>';
  }

  detailView.innerHTML=html;

  /* 차트 렌더 */
  const chartCanvas=document.getElementById('univTotalChart');
  if(chartCanvas){
    const chartRecords=validRecords.filter(r=>r[totalColIdx]&&parseFloat(r[totalColIdx])>0);
    new Chart(chartCanvas,{type:'line',data:{
      labels:chartRecords.map(r=>r[1]),
      datasets:[{label:'총점',data:chartRecords.map(r=>parseFloat(r[totalColIdx])||null),borderColor:color,backgroundColor:color+'15',tension:.4,pointRadius:6,pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:3,fill:true}]
    },options:makeLineOpts(false)});
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function hideUnivDetail(){
  document.getElementById('univListView').style.display='';
  document.getElementById('univDetail').className='univ-detail';
  document.getElementById('univDetail').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ====== 탭 ====== */
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');document.getElementById('p-'+b.dataset.t).classList.add('on');
    /* 대학 상세에서 탭 이동 시 목록으로 복원 */
    if(b.dataset.t==='univ'){document.getElementById('univListView').style.display='';document.getElementById('univDetail').className='univ-detail';document.getElementById('univDetail').innerHTML=''}
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

initLogin();
</script>
</body>
</html>
