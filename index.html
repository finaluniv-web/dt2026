<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SID='1JT-y2ZF6GLQD4ZYzP8yxFp6flxxc_F_vCMXGdY-gogs';
const sURL=n=>`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`;
const URLS={info:sURL('1.인적사항'),fitness:sURL('2.실기테스트'),mock:sURL('3.모의고사성적'),gpa:sURL('4.내신성적')};
const studentName=new URLSearchParams(location.search).get('name')||'권민진';
document.title=`${studentName} - FINAL 기록지`;

function parseRow(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}
function parseCSV(t){const ls=t.split('\n').filter(l=>l.trim());if(ls.length<2)return[];const h=parseRow(ls[0]);return ls.slice(1).map(l=>{const c=parseRow(l);const o={};h.forEach((k,i)=>o[k]=c[i]||'');return o})}
function fDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');return`${s.substring(2,4)}.${s.substring(4,6)}`}
function fullDate(d){if(!d||d.length<6)return d;const s=d.replace(/\D/g,'');return`20${s.substring(0,2)}.${s.substring(2,4)}.${s.substring(4,6)}`}

function makeLineOpts(reverse){
  return{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12,family:'Noto Sans KR'},bodyFont:{size:11,family:'Noto Sans KR'},padding:10,cornerRadius:8,displayColors:true}},
    scales:{y:Object.assign({grid:{color:'#f3f4f6'},ticks:{font:{size:10}}},reverse?{reverse:true,min:1,max:9,ticks:{stepSize:1,font:{size:10}}}:{beginAtZero:false}),x:{grid:{display:false},ticks:{font:{size:10}}}}
  };
}

/* ====== 프로필 ====== */
function renderProfile(info,fc,mc){
  const n=info['이름']||studentName;
  const cls=info['수강반']||'';
  const av=document.getElementById('av');
  if(cls){av.textContent=cls;av.style.fontSize=cls.length>3?'11px':'13px'}else{av.textContent=n.slice(-1);av.style.fontSize='20px'}
  document.getElementById('pName').textContent=n;
  document.getElementById('pSub').textContent=`${info['학교']||''} ${info['학년']||''} · 개인 기록지`;
  let h='';
  if(cls) h+=`<span class="p-tag class-tag">${cls}</span>`;
  if(info['성별']) h+=`<span class="p-tag">${info['성별']}</span>`;
  if(fc) h+=`<span class="p-tag">🏃 실기 <b>${fc}회</b></span>`;
  if(mc) h+=`<span class="p-tag">📝 모의고사 <b>${mc}회</b></span>`;
  document.getElementById('pTags').innerHTML=h;
}

/* ====== 실기 ====== */
function renderFitness(raw){
  const lines=raw.split('\n').filter(l=>l.trim());
  if(lines.length<2)return 0;
  const rows=[];
  for(let i=1;i<lines.length;i++){const c=parseRow(lines[i]);if(c[1]===studentName)rows.push(c)}
  if(!rows.length){document.getElementById('fitNone').style.display='';return 0}
  rows.sort((a,b)=>a[0].localeCompare(b[0]));

  const items=[
    {name:'배근력',u:'kg',ri:5,si:6,color:'#ec4899'},
    {name:'10m왕복',u:'초',ri:7,si:8,color:'#4f46e5'},
    {name:'메디신볼',u:'m',ri:9,si:10,color:'#06b6d4'},
    {name:'좌전굴',u:'cm',ri:11,si:12,color:'#10b981'},
    {name:'제자리멀리뛰기',u:'cm',ri:13,si:14,color:'#f59e0b'},
    {name:'20m왕복',u:'초',ri:15,si:16,color:'#8b5cf6'},
  ];
  const tI=rows[0].length-2;

  const L=rows[rows.length-1],F=rows[0],st=document.getElementById('fitStats');
  let s=`<div class="stat-box"><div class="sl">측정</div><div class="sv">${rows.length}</div><div class="su">회</div></div>`;
  s+=`<div class="stat-box"><div class="sl">최신 총점</div><div class="sv">${L[tI]||'-'}</div><div class="su">/ 600</div></div>`;
  if(rows.length>1){const d=parseFloat(L[tI])-parseFloat(F[tI]);s+=`<div class="stat-box"><div class="sl">성장</div><div class="sv ${d>=0?'up':'dn'}">${d>0?'+':''}${d}</div><div class="su">점</div></div>`}
  items.forEach(it=>{const v=L[it.si];if(v)s+=`<div class="stat-box"><div class="sl">${it.name}</div><div class="sv">${v}</div><div class="su">점</div></div>`});
  st.innerHTML=s;

  const hdr=document.getElementById('fitH');
  hdr.innerHTML='<th>날짜</th>';
  items.forEach(it=>hdr.innerHTML+=`<th>${it.name}<br><span style="color:#d1d5db;font-weight:400">${it.u}</span></th><th>점수</th>`);
  hdr.innerHTML+='<th style="background:#eef1ff">총점</th>';
  const tb=document.getElementById('fitB');
  rows.forEach((c,i)=>{
    const tr=document.createElement('tr');
    let h=`<td class="dt">${fullDate(c[0])}</td>`;
    items.forEach(it=>{
      const sc=c[it.si]||'';let ch='';
      if(i>0&&sc&&rows[i-1][it.si]){const d=parseFloat(sc)-parseFloat(rows[i-1][it.si]);if(d>0)ch=`<br><span class="chg-up">+${d}</span>`;else if(d<0)ch=`<br><span class="chg-dn">${d}</span>`}
      h+=`<td>${c[it.ri]||'-'}</td><td>${sc||'-'}${ch}</td>`;
    });
    h+=`<td style="font-weight:800;background:#fafaff;color:var(--accent)">${c[tI]||'-'}</td>`;
    tr.innerHTML=h;tb.appendChild(tr);
  });

  const dateLabels=rows.map(r=>fDate(r[0]));

  // 총점 차트 (X축 = 날짜)
  new Chart(document.getElementById('fitTotalChart'),{
    type:'line',data:{labels:dateLabels,datasets:[{
      label:'총점',data:rows.map(r=>parseFloat(r[tI])||null),
      borderColor:'#312e81',backgroundColor:'rgba(79,70,229,.1)',
      tension:.4,pointRadius:6,pointBackgroundColor:'#4f46e5',
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:3,fill:true,
    }]},options:makeLineOpts(false)
  });

  // ★ 종목별 차트 (X축 = 기록값+단위, 툴팁에 날짜·점수 표시)
  const container=document.getElementById('fitItemCharts');
  items.forEach(it=>{
    const scores=rows.map(r=>parseFloat(r[it.si])||null);
    const recs=rows.map(r=>r[it.ri]?r[it.ri]+it.u:'');
    if(scores.every(v=>v===null))return;

    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="card-title"><span class="dot" style="background:${it.color}"></span>${it.name} <span style="font-weight:400;color:#9ca3af;font-size:12px">(${it.u})</span></div><div class="chart-box"><canvas></canvas></div>`;
    container.appendChild(card);

    new Chart(card.querySelector('canvas'),{
      type:'line',data:{labels:recs,datasets:[{
        label:it.name+' 점수',data:scores,
        borderColor:it.color,backgroundColor:it.color+'15',
        tension:.4,pointRadius:6,pointBackgroundColor:it.color,
        pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,fill:true,
      }]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:false},
          tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12,family:'Noto Sans KR'},bodyFont:{size:11,family:'Noto Sans KR'},padding:10,cornerRadius:8,
            callbacks:{
              title:ctx=>{const i=ctx[0].dataIndex;return fullDate(rows[i][0]);},
              label:ctx=>{const i=ctx.dataIndex;return `기록: ${recs[i]} → 점수: ${scores[i]}점`;}
            }
          }
        },
        scales:{
          y:{beginAtZero:false,grid:{color:'#f3f4f6'},ticks:{font:{size:10}},title:{display:true,text:'점수',font:{size:10,weight:'bold'}}},
          x:{grid:{display:false},ticks:{font:{size:9}},title:{display:true,text:'기록 ('+it.u+')',font:{size:10,weight:'bold'}}}
        }
      }
    });
  });
  return rows.length;
}

/* ====== 모의고사 ====== */
function renderMock(raw){
  const lines=raw.split('\n').filter(l=>l.trim());
  if(lines.length<2)return 0;
  const rows=[];
  for(let i=1;i<lines.length;i++){const c=parseRow(lines[i]);if(c[1]===studentName)rows.push(c)}
  if(!rows.length){document.getElementById('mockNone').style.display='';return 0}

  const subjs=[
    {name:'국어',sC:5,rC:6,tC:7,pC:8,gC:9,color:'#ec4899'},
    {name:'수학',sC:10,rC:11,tC:12,pC:13,gC:14,color:'#4f46e5'},
    {name:'영어',sC:null,rC:15,tC:null,pC:null,gC:16,color:'#06b6d4'},
    {name:'탐구1',sC:17,rC:18,tC:19,pC:20,gC:21,color:'#10b981'},
    {name:'탐구2',sC:22,rC:23,tC:24,pC:25,gC:26,color:'#f59e0b'},
    {name:'한국사',sC:null,rC:27,tC:null,pC:null,gC:28,color:'#8b5cf6'},
  ];

  // ★ 모의고사 카드: 6칸 고정, 영어·한국사도 동일 구조
  const list=document.getElementById('mockList');
  rows.forEach(c=>{
    const div=document.createElement('div');div.className='m-card';
    let sHTML='';
    subjs.forEach(s=>{
      const g=parseInt(c[s.gC]);
      const sub=s.sC!==null?c[s.sC]:'';
      const rv=c[s.rC]||'';
      const pct=s.pC!==null?c[s.pC]:'';

      let detail='';
      if(rv){
        if(pct) detail=`${rv}점 / ${pct}%`;
        else detail=`${rv}점`;
      }

      if(g){
        sHTML+=`<div class="m-subj">
          <div class="ms-name">${s.name}${sub?'<br>'+sub:''}</div>
          <div class="ms-grade mg${g}">${g}<span style="font-size:10px;font-weight:500">등급</span></div>
          <div class="ms-detail">${detail}</div>
        </div>`;
      } else {
        sHTML+=`<div class="m-subj" style="opacity:.3">
          <div class="ms-name">${s.name}</div>
          <div class="ms-grade" style="color:#d1d5db">-</div>
          <div class="ms-detail">미응시</div>
        </div>`;
      }
    });
    div.innerHTML=`<div class="m-exam">${c[0]}</div><div class="m-subjects">${sHTML}</div>`;
    list.appendChild(div);
  });

  // 스탯
  const L=rows[rows.length-1],st=document.getElementById('mockStats');
  const mg=[9,14,16].map(i=>parseInt(L[i])).filter(g=>g>0);
  let s=`<div class="stat-box"><div class="sl">최근 시험</div><div class="sv" style="font-size:13px">${L[0]}</div></div>`;
  if(mg.length){const avg=(mg.reduce((a,b)=>a+b,0)/mg.length).toFixed(1);s+=`<div class="stat-box"><div class="sl">주요 평균</div><div class="sv">${avg}</div><div class="su">등급</div></div>`}
  subjs.forEach(sj=>{const g=L[sj.gC];if(g)s+=`<div class="stat-box"><div class="sl">${sj.name}</div><div class="sv mg${g}">${g}</div><div class="su">등급</div></div>`});
  st.innerHTML=s;

  // 상세 테이블
  const mH=document.getElementById('mockH');
  mH.innerHTML='<th>시험</th>';
  subjs.forEach(s=>{
    if(s.tC!==null) mH.innerHTML+=`<th>${s.name}</th><th>원점수</th><th>표준</th><th>백분위</th><th>등급</th>`;
    else mH.innerHTML+=`<th>${s.name}<br>원점수</th><th>등급</th>`;
  });
  const mB=document.getElementById('mockB');
  rows.forEach(c=>{
    const tr=document.createElement('tr');
    let h=`<td class="dt" style="white-space:nowrap">${c[0]}</td>`;
    subjs.forEach(s=>{
      const g=parseInt(c[s.gC])||0;
      const gb=g>=1&&g<=9?`gb${g}`:'';
      if(s.tC!==null){
        h+=`<td style="font-size:9px">${s.sC!==null?c[s.sC]:''}</td><td>${c[s.rC]||'-'}</td><td>${c[s.tC]||'-'}</td><td>${c[s.pC]||'-'}</td><td><span class="gb ${gb}">${g||'-'}</span></td>`;
      }else{
        h+=`<td>${c[s.rC]||'-'}</td><td><span class="gb ${gb}">${g||'-'}</span></td>`;
      }
    });
    tr.innerHTML=h;mB.appendChild(tr);
  });

  const labels=rows.map(r=>r[0]);

  // 전체 등급 차트
  const allDS=subjs.filter(s=>s.name!=='한국사').map(s=>({
    label:s.name,data:rows.map(r=>parseInt(r[s.gC])||null),
    borderColor:s.color,backgroundColor:s.color+'18',
    tension:.4,pointRadius:6,pointBackgroundColor:s.color,
    pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,
  }));
  new Chart(document.getElementById('mockAllChart'),{
    type:'line',data:{labels,datasets:allDS},
    options:Object.assign({},makeLineOpts(true),{
      plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Noto Sans KR'},usePointStyle:true,pointStyle:'circle',padding:12}},tooltip:makeLineOpts(true).plugins.tooltip}
    })
  });

  // 과목별 개별 차트
  const container=document.getElementById('mockSubjCharts');
  subjs.forEach(s=>{
    const data=rows.map(r=>parseInt(r[s.gC])||null);
    if(data.every(v=>v===null))return;
    let dispName=s.name;
    if(s.sC!==null){const names=[...new Set(rows.map(r=>r[s.sC]).filter(Boolean))];if(names.length)dispName+=` (${names.join(', ')})`}
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="card-title"><span class="dot" style="background:${s.color}"></span>${dispName}</div><div class="chart-box"><canvas></canvas></div>`;
    container.appendChild(card);

    const datasets=[{
      label:'등급',data,yAxisID:'y',
      borderColor:s.color,backgroundColor:s.color+'15',
      tension:.4,pointRadius:6,pointBackgroundColor:s.color,
      pointBorderColor:'#fff',pointBorderWidth:2.5,borderWidth:2.5,fill:true,
    }];
    let scales={y:{reverse:true,min:1,max:9,ticks:{stepSize:1,font:{size:10}},grid:{color:'#f3f4f6'},position:'left'},x:{grid:{display:false},ticks:{font:{size:9}}}};

    if(s.pC!==null){
      const pctData=rows.map(r=>parseInt(r[s.pC])||null);
      datasets.push({
        label:'백분위',data:pctData,yAxisID:'y2',
        borderColor:s.color+'60',backgroundColor:'transparent',
        borderDash:[5,5],tension:.4,pointRadius:4,
        pointBackgroundColor:s.color+'80',pointBorderColor:'#fff',pointBorderWidth:1.5,borderWidth:1.5,
      });
      scales.y2={reverse:false,min:0,max:100,position:'right',grid:{display:false},ticks:{font:{size:9},callback:v=>v+'%'}};
    }

    new Chart(card.querySelector('canvas'),{
      type:'line',data:{labels,datasets},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
        plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'Noto Sans KR'},usePointStyle:true,pointStyle:'circle',padding:10}},
        tooltip:{backgroundColor:'rgba(17,24,39,.92)',titleFont:{size:12},bodyFont:{size:11},padding:10,cornerRadius:8}},scales}
    });
  });

  return rows.length;
}

/* ====== 내신 ====== */
function renderGPA(gpa){
  const keys=['전과목','국영','국수영','국수영사','국수영과','영탐'];
  const labels=['전과목','국어·영어','국·수·영','국·수·영·사','국·수·영·과','영어·탐구'];
  if(!keys.some(k=>gpa[k])){document.getElementById('gpaNone').style.display='';return}
  const g=document.getElementById('gpaGrid');
  keys.forEach((k,i)=>{const v=gpa[k];if(!v)return;g.innerHTML+=`<div class="gpa-card"><div class="gc-label">${labels[i]}</div><div class="gc-val">${v}</div><div class="gc-sub">등급</div></div>`});
}

/* ====== 탭 ====== */
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('p-'+b.dataset.t).classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

/* ====== 실행 ====== */
(async()=>{
  try{
    const [iT,fT,mT,gT]=await Promise.all([
      fetch(URLS.info).then(r=>r.text()),
      fetch(URLS.fitness).then(r=>r.text()),
      fetch(URLS.mock).then(r=>r.text()),
      fetch(URLS.gpa).then(r=>r.text()),
    ]);
    const info=(parseCSV(iT).find(r=>r['이름']===studentName))||{};
    const gpa=(parseCSV(gT).find(r=>r['이름']===studentName))||{};
    const fc=renderFitness(fT);
    const mc=renderMock(mT);
    renderProfile(info,fc,mc);
    renderGPA(gpa);
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<p class="err-msg">데이터를 불러오지 못했습니다.<br>새로고침 해주세요.</p>';
    return;
  }
  document.getElementById('loading').classList.add('hide');
  const a=document.getElementById('app');a.style.transition='opacity .5s';a.style.opacity='1';
})();
</script>
